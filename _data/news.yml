- title: A股指数体系迈向精细化，年内新增374条指数
  description: 据Wind数据统计，截至目前，年内A股已新增374条指数。其中，科技类主题指数成为发布主流，产品布局围绕机器人、半导体、人工智能、新型电力系统四大领域，持续向产业链关键环节延伸聚焦。与此同时，这一精细化趋势不仅体现在新发指数上，更体现在对存量旗舰指数的系统性规则修订上，相关机构通过引入ESG负面剔除、调整样本容量、优化选样流程等机制，不断提升指数的市场表征准确性、风险控制能力以及对新质生产力的引导作用。（证券日报）
