- title: 特斯拉去年从SpaceX与xAI斩获5.73亿美元营收
  description: 特斯拉在修订后的年度备案文件中披露，去年通过向埃隆・马斯克旗下另外两家企业销售产品，创收超5亿美元。特斯拉今年1月首度披露，营收中的大头约4.301亿美元，来自与马斯克旗下人工智能初创公司xAI的业务往来。这家车企于周四提交修订版备案文件，补充称还从马斯克私人控股的航天企业太空探索技术公司（SpaceX）确认营收1.433亿美元。特斯拉在今年1月发布的初始年度报告中，并未披露后一项金额。本月早些时候，媒体曾报道，SpaceX去年第四季度采购了价值超1亿美元的赛博卡车——即特斯拉这款销量表现疲软的电动皮卡。（财联社）
