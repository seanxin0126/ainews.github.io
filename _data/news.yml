- title: 多家出版商起诉Meta指控其盗用版权作品训练人工智能
  description: 多家出版商对Meta平台公司提起集体诉讼，指控其非法使用受版权保护的作品，用于搜集素材并训练旗下人工智能模型。此次发起诉讼的机构与个人包括：圣智学习（Cengage
