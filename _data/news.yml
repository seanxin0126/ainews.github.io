- title: 传可灵计划独立融资上市：300 亿美元的快手长出 200 亿美元的 AI 视频子公司
  description: '头图来源：视觉中国

     

     

    5月11日，据《The Information》报道，快手科技正计划将旗下可灵（Kling）AI视频业务分拆，于2027年第一季度启动首次公开募股。目前快手已与潜在投资者展开上市前融资洽谈，此轮对可灵的估值定为200亿美元。

     


     

