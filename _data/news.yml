- title: 新易盛：上半年净利同比预增78%-103% 受益于人工智能相关算力投资持续增长产品结构优化
  description: 36氪获悉，新易盛公告称，预计2026年半年度归属于上市公司股东的净利润为70.00亿元-80.00亿元，同比增长77.56%-102.93%。业绩变动主要系受益于人工智能相关算力投资持续增长，产品结构优化，公司销售收入和净利润较上年同期大幅增加。小财注：公司Q2净利润预计42.2亿-52.2亿，Q1净利润27.8亿，据此计算，Q2净利润预计环比增长51%-87%。
