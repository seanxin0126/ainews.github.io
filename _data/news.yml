- title: 奥特曼嘲讽马斯克“太空数据中心”构想：在当下“荒谬” 本十年也难成气候
  description: "2 月 21 日，OpenAI 首席执行官山姆·奥特曼在印度新德里出席一场公开活动时，对埃隆·马斯克提出的“将数据中心搬到太空”的计划作出尖锐评价，称在当前技术和成本条件下，这一想法“荒谬可笑”，激起现场观众一阵笑声。\r\
    \n奥特曼表示，从长远来看，把数据中心部署到地球轨道“总有一天会变得有意义”，但以现阶段的发射成本和在太空维修芯片等硬件的难度而言，这一构想远未到可行落地的时点。“老实讲，以目前的技术格局来看，把数据中心放到太空，是一个荒谬的想法。”奥特曼在与当地媒体的直播访谈中说。\
    \ 他强调，轨道数据中心或许在未来…"
