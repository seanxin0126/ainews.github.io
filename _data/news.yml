- title: 加拿大枪击案嫌犯曾用ChatGPT生成暴力场景 OpenAI未向警方预警
  description: "美国开放人工智能研究中心（OpenAI）表示，加拿大不列颠哥伦比亚省塔布勒岭校园枪击案发生前几个月，枪手与ChatGPT聊天机器人互动，OpenAI曾考虑提醒执法部门。\r\
    \n知情人士透露，枪手杰西·范·鲁特塞拉尔在2025年6月使用ChatGPT时，描述了涉及枪支暴力的场景，并被自动审查系统标记。OpenAI一些员工将鲁特塞拉尔的行为解释为潜在现实世界暴力的迹象，并敦促公司领导提醒加拿大执法部门注意，不过OpenAI领导最终决定不联系当局。OpenAI一位发言人表示，该公司封禁了鲁特塞拉尔的帐户，但确定其活动并不符…"
  url: https://www.cnbeta.com.tw/articles/tech/1550714.htm
