- title: 15天学会AI应用开发（三）把历史对话作为提示词会怎样 - aqi00
  description: ​AI大模型服务的用户很多，它对每个用户的印象仅存在于当前会话中，一旦用户离开当前会话重新开启新的会话，AI会把该用户当作是新用户，而非之前已经对话过的某个用户。
    也就是说，AI没有持久记忆的功能，它记不住你上次问了什么，也记不住它上次回答了什么。这意味着AI没法从过往的对话中吸取经验，原本纠正了的
