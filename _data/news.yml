- title: 上海交大教授创业，用AI研发新材料，交大系基金投资｜36氪首发
  description: "作者丨欧雪\n 编辑丨袁斯来\n 硬氪获悉，AI for Materials（人工智能赋能新材料研发）领域的初创企业——索格智算宣布完成超千万元种子轮融资。本轮融资由启高资本领投，交大菡源资产、紫竹小苗和紫竹科投跟投。资金将主要用于原创AI计算引擎的持续研发、研发团队扩充以及算力基础设施建设。\n\
    \ 索格智算成立于2025年9月，创始团队源自上海交通大学，由数学学院特聘教授、人工智能新材料研究中心主任徐振礼领衔。团队其他核心成员也拥有数学、人工智能、高性能计算与材料科学的交叉学科背景。\n\
