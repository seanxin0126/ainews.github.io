  description: 受市场愈发担忧人工智能带动的存储芯片板块涨幅过高影响，日本存储芯片企业铠侠控股在登顶日本市值最高企业仅一个月后，总市值直接腰斩。周五东京股市早盘，铠侠股价最大跌幅达14%，较上月峰值累计下跌51%，市值蒸发至少29.5万亿日元（折合1817亿美元）。6月中旬，受人工智能热潮下市场对内存、数据存储需求的乐观情绪推动，铠侠股价年内涨幅超600%，市值一举超越汽车巨头丰田汽车，登顶日本企业市值榜首。如今其市值排名已滑落至��本上市公司第四位。（新浪财经）
