- title: 貝森特指控中國 AI 侵權 浮水印揭盜用蒸餾技術 美方研制裁涉事企業
  description: 美國財政部長貝森特日前公開表示，美方目前正深入調查中國多款人工智能模型，是否涉及竊取美國企業知識產權。他警告指出，一旦調查證實相關違規行為屬實，美方未來隨時會對涉事單位實施相應制裁。美方指控部分中國
    AI 模型輸出內容發現美國大型語言模型獨有浮水印，正調查相關盜用行為並考慮實施制裁。
