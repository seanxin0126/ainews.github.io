- title: 多只“老登”新基延长募集期，抢占潜在风格切换先机却响应冷淡
  description: 近日，多只聚焦食品消费、金融等传统“核心资产”（业内称之“老登”）的新发基金频频延长募集期，部分产品甚至半个月内两次延长募集期，最终仅勉强跨过2亿元成立门槛。在AI科技行情高位震荡的背景下，基金公司逆势布局“老登”资产，背后折射出复杂的矛盾心态：一方面，全品类大型公募为抢占潜在风格切换先机，不得不提前卡位；另一方面，市场低迷导致资金响应冷淡，新基金即便勉强成立，后续能否做大仍存悬念。有业内人士指出，与存量基金相比，新发基金更易“讲故事”，但行情何时到来尚不确定，“老登”资产的复苏之路依然漫长。（证券时报）
