- title: 美国拟推“科技志愿队”出海推广本土 AI
  description: "美国政府正筹划组建一支类似“和平队”的“科技志愿队”（Tech Corps），派遣志愿者前往海外，向各国推广美国的人工智能技术，以在全球\
