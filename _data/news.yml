- title: 75%公司料ICT從業員獲加薪 27.5%平均增4%
  description: 智能科技應用於各行各業，相關人才需求持續上升。香港電腦學會昨公布最新的資訊及通訊科技(ICT)行業薪酬趨勢調查，結果顯示，2025年度有75%本地ICT從業員獲加薪，其中57.5%僱員加幅介乎1%至4%，12.5%達5%或以上。今年有75%受訪公司預期會提升ICT從業員薪酬，當中27.5%公司平均增4%或以上。五成半公司在2025年有招聘ICT應屆畢業生，42.5%公司為大學畢業生提供1.8萬元以上入職薪酬，有10%公司達2.2萬元或以上。今年亦有60%企業願意為修讀ICT的學生提供實習機會。調查結果顯示，目前以…
