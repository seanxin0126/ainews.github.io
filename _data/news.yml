- title: 谷歌算力告急，限制Meta对其人工智能大模型Gemini的使用
  description: 谷歌已开始限制脸书母公司Meta对其人工智能大模型Gemini的使用，因为Meta的算力需求超出了谷歌现有的承载能力。供给受限直接打乱了Meta内部多个人工智能项目的推进节奏，相关研发工作被迫推迟。报道称，谷歌这一举措直观暴露出算力供给仍是人工智能产业发展的核心瓶颈。即便谷歌持续加码AI基础设施投入，但依旧无法确保有足够的算力应对市场激增的需求。（财联社）
  url: https://36kr.com/newsflashes/3873989664822275
  source: 36kr.com
- title: 马斯克：SpaceX计划今年每月发布一个全新的人工智能模型
  description: 当地时间周日（28日），马斯克在其社交媒体平台X上发文称，旗下最新一代大语言模型Grok 4.5已正式在SpaceX和特斯拉内部开启Beta测试，之后才会进行更广泛的推广。马斯克还表示，SpaceX计划在今年剩余的时间里每月发布一个“完全从零开始训练”的全新人工智能模型。这番言论暗示，未来的版本可能并非对现有系统的简单改进，而是通过全新训练构建的全新基础模型。（财联社）
