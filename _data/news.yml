- title: 逾千家A股公司发布2025年业绩快报，近七成营收增长
  description: 截至3月3日午间，A股已有1032家上市公司发布2025年度业绩快报。其中，714家公司实现营业收入同比增长，占比近七成；52家公司净利润同比增幅超100%；65家扭亏为盈。从行业结构来看，半导体、创新药、高端装备制造等战略性新兴产业表现亮眼。人工智能（AI）产业快速发展、海外市场持续拓展，成为这些行业业绩增长的两大核心驱动力。（上证报）
