- title: 黑芝麻智能配股融资6.31亿港元
  description: 36氪获悉，3月9日，黑芝麻智能公告，公司与认购人无极资本（Infini Capital）订立认购协议，配发及发行合共约3354.46万股认购股份，每股认购价为18.88港元，较公司3月9日收盘价19.29港元折让2.13%，总代价约为6.31亿港元。据公告，本次募集资金主要用于新一代高性能芯片的研发，拓展机器人产品线及端侧AI产品线，加速产品商业化落地。
