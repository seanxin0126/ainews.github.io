- title: 科技记者古尔曼：苹果将跳过M6 Pro/Max芯片 全力押注AI导向的M7系列
  description: 科技记者马克・古尔曼透露，苹果将推出标准版M6芯片，但不会推出定位更高端的M6 Pro和M6 Max芯片。他表示，这一打破以往产品节奏的决定，原因在于AI。苹果原本计划为M7系列带来神经网络处理能力的大幅升级，最终认为这些改进足够重要，因此决定加快下一代产品的推出，而不是完成整个M6产品线。（财联社）
