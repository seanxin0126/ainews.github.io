    \ 根据中国船东协会数据，国内注册机动船舶超过12万艘，加上各类非机动船、公园游船、作业船，总量超过50万艘；其中，具备智能驾驶能力的船舶占比不足1%，具备L4级无人驾驶能力的更是寥寥无几。\n\
