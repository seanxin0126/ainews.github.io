- title: 中电信人工智能科技公司增资至约33.7亿元
  description: 36氪获悉，爱企查App显示，近日，中电信人工智能科技（北京）有限公司发生工商变更，新增北京市人工智能产业投资基金（有限合伙）、国家人工智能产业投资基金合伙企业（有限合伙）等为股东，同时，注册资本由30亿元人民币增至约33.7亿元人民币，增幅约12%。
    该公司成立于2023年11月，法定代表人为何忠江，经营范围包括人工智能行业应用系统集成服务、人工智能基础资源与技术平台、人工智能理论与算法软件开发等，现由中国电信股份有限公司及上述新增股东共同持股。
