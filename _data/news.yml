- title: 山姆·奥特曼质疑企业借人工智能当替罪羊
  description: "在印度举办的 AI Impact 峰会上，OpenAI 创始人兼首席执行官山姆·奥特曼表示，他怀疑不少公司正在借“人工智能”之名，为本来就计划实施的裁员寻找挡箭牌，将本应由自身经营决策承担的责任，转嫁到新技术身上。\
    \ 在接受 CNBC-TV18 采访时，奥特曼称，如今企业把 AI 当作“背锅侠”的情况正在出现，而这与真正由 AI 带来的岗位替代并不完全相同。\r\n\
    奥特曼说：“我不知道确切比例，但现在确实存在某种程度的‘AI 洗牌’——一些公司把本来就会进行的裁员归咎于 AI，同时也确实存在 AI 对某些岗位的真实替代…"
