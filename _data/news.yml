- title: Anthropic正考虑以超9000亿美元估值开启新一轮融资
  description: 知情人士透露，Anthropic正在权衡新一轮融资，此轮融资对这家人工智能开发商的估值将超过9000亿美元。该公司正考虑来自投资者的要约，这些要约将使其当前估值翻倍有余，目前相关考量尚处于早期阶段。Anthropic一直在寻求更多基础设施，以满足其产品日益增长的需求。此次新讨论正值该公司AI软件取得突破性成功、大力推进融资之际。（财联社）
