- title: 博通宣布与Meta扩大合作，总裁兼CEO陈福阳将转任Meta顾问
  description: 当地时间4月14日，博通公司与Meta宣布达成多年多代战略合作，以支持Meta快速扩展的人工智能计算基础设施。基于现有合作基础，博通将为Meta训练与推理加速器（MTIA）芯片提供技术支持，双方计划将合作延续至2029年。该技术将成为Meta部署尖端AI数据中心的基础架构核心。首期合作规模超过1吉瓦。鉴于此次扩展合作的规模，陈福阳（Hock
    Tan）将从Meta董事会卸任，转任Meta顾问角色，他将为Meta的定制芯片路线图提供指导。（新浪财经）
