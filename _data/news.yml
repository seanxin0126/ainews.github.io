- title: Sam Altman：人工智能被当作近期大规模裁员替罪羊
  description: "几个月来，美国各行各业的裁员人数都在上升，包括科技、金融、零售和媒体等行业。一些知名企业，例如亚马逊、Meta、花旗集团等，也宣布了裁员计划，因为它们将投资转向人工智能和自动化领域，以适应不断变化的经济环境。\r\
    \n然而，OpenAI首席执行官萨姆·奥特曼(Sam Altman)近日驳斥了人工智能是导致裁员的主要原因的说法。奥特曼最近在印度新德里举行的AI影响力峰会上接受采访时表示：“我不知道确切的比例是多少，但目前存在一些人工智能洗白现象，人们将原本会裁员的原因归咎于人工智能，而人工智能也确实取代了一些不同类型的工…"
