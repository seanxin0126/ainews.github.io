- title: A股公司2025年合计盈利5.36万亿元，同比增长近3%
  description: 4月29日，A股2025年年报及2026年一季报披露收官。整体来看，上市公司去年盈利稳步修复，今年一季度增长动能显著增强，形成新动能强劲、传统行业回暖的良好格局。2025年A股上市公司经营韧性持续彰显，营收与利润双增。至4月29日20时记者截稿，Wind数据统计显示，超5200家公司公布2025年年报，合计实现营收70.95万亿元、归母净利润5.36万亿元，同比分别增长1.16%、2.95%。深度贴合新能源规模化落地、AI全域场景应用赛道的电力设备、计算机、电子、传媒行业盈利增速领跑全市场。（证券时报）
