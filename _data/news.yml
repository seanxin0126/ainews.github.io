  description: 4月30日，有媒体报道称，米哈游国际化总裁金雯怡发布内部信，表示自己将于5月底离开米哈游/HoYoverse，Seven（王宇阳）将接替她继续带领国际化。对此，米哈游方面回应表示：雯怡因个人职业规划原因，已向公司提出离职。公司感谢其在产品全球化发展中的付出与贡献，也祝雯怡未来发展一切顺利。据公开信息，金雯怡曾在游戏公司FunPlus任职，入职米哈游后负责海外业务。Seven（王宇阳）为大鹅文化创始人，曾担任B站副总裁。2024年，王宇阳加入米哈游联合创始人蔡浩宇成立的AI公司。（界面）
