- title: 海致科技与某大型煤业集团达成合作，助力矿山智能化升级
  description: 近期，海致科技签署千万级项目合同，服务某大型煤业集团，在其下属国家示范矿井部署海致Atlas智能体平台。依托该平台，海致科技将为该标杆矿井构建覆盖生产、安全、经营管理的智能决策支持体系，推动煤矿运营从人工经验判断向数据驱动的智能决策转变。
