- title: 摩根大通CEO警告人工智能技术引发的网络攻击风险
  description: 摩根大通CEO杰米·戴蒙周二表示，虽然人工智能工具最终可能帮助企业抵御网络攻击，但它们最初却让企业更容易受到攻击。戴蒙表示，摩根大通正在测试Anthropic上周发布的最新人工智能模型Mythos预览版，这是该公司为充分利用人工智能的优势并防范恶意行为者利用该技术而采取的更广泛举措的一部分。（新浪财经）
