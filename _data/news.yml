- title: 美国政府据悉要求OpenAI分阶段发布最新模型GPT-5.6
  description: 据一位知情人士透露，特朗普政府要求OpenAI分阶段发布即将推出的一款强大人工智能模型。而就在不到两周前，该公司的竞争对手Anthropic
    PBC迫于监管压力暂停了对其尖端模型的访问。因讨论未公开消息而要求匿名的这位知情人士表示，OpenAI首席执行官Sam Altman周三告诉员工，美国政府要求公司先向一小部分值得信赖的合作伙伴发布GPT-5.6，之后再向更多用户推出。知情人士表示，Altman在员工会议上称，美国政府对最前沿模型的性能越来越感到担忧。（财联社）
