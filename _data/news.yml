- title: 英伟达谷歌AI液冷路线亮相，A股公司全产业链布局
  description: 近期，AI液冷技术路径再度成为业内讨论的焦点。谷歌推出Brazos技术路线，大幅提升传统数据中心性能。英伟达在其官方博客发文介绍了Rubin全液冷方案。这意味着散热正成为行业关注的问题。业内人士表示，当前数据中心制冷三类技术路线并存。由于全球各地基建配套、地理气候条件存在差异，未来数据中心或以液冷为核心，与其他路线并行。目前，国内多家上市公司已布局AI液冷，覆盖冷板、CDU等零部件、制冷液、整机设备等全产业链环节。（上证报）
  url: https://36kr.com/newsflashes/3867818077213952
  source: 36kr.com
- title: Anthropic斷供讓台灣看到一件事：能造AI晶片，不等於控制自己的AI開關
  description: 過去台灣談科技風險多半只想到晶片禁運、設備管制、供應鏈中斷。這些風險當然嚴重但通常還有緩衝期。但AI雲端服務則不同，若API被突然切斷，模型不能使用，許多接上AI的客服、資安、醫療判讀、金融風控、教育平台與政府流程，可能立刻失靈。
