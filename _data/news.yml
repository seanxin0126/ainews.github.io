- title: 2026年A股掀起“高端扩产潮”，AI与新能源领跑
  description: 2026年开年以来，A股上市公司接连披露大额扩产与年度投资计划。记者梳理发现，新能源、AI算力产业链以及半导体，是本轮扩产最为集中的几大方向。现金流充裕的龙头企业更多使用自有资金，定向增发则成为硬科技企业的主要融资渠道。尽管市场对周期性波动心存警惕，但多位业内人士认为，与前几轮扩产相比，这一轮扩张更加聚焦高端产能与技术升级。在明确的需求驱动下，扩产已成为头部企业争夺下一个技术窗口期的必然选择。（上证报）
