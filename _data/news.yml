- title: 微软本十年末前将向全球南方 AI 领域投资 500 亿美元
  description: 微软在印度人工智能影响力峰会上宣布，计划在本十年末前投资 500 亿美元，助力将人工智能技术推广至全球南方各国。微软这项旨在发挥 AI
    影响力的五大计划包括：建设人工智能普及所需的基础设施；通过技术与技能培训赋能学校及非营利机构人员；强化多语言、多元文化的人工智能能力；推动满足社区需求的本地人工智能创新；评估人工智能普及情况，为未来人工智能政策与投资提供指导。
