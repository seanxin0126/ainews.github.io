- title: ​国行版苹果AI突然上线后又被撤回，苹果回应：正在积极推进落地中国
  description: 3月31日，国行iPhone设置页面短暂出现“Apple智能与Siri”选项，引发Apple Intelligence国行版落地热议，但该入口很快被移除，已下载模型的用户功能也被收回。苹果方面就此进行回应称，由于软件问题，中国的iPhone和iPad设备曾短暂地可以下载其他地区适用的设备端Apple
