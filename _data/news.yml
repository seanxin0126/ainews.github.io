- title: AI拉动覆铜板需求激增，国产高端材料迎导入窗口
  description: 近期，股市上覆铜板板块持续走强。Choice数据显示：4月1日以来，方邦股份股价涨幅接近100%；生益科技、南亚新材等多家覆铜板上市公司股价也持续攀升。股价上涨背后，AI服务器、高速交换机需求快速增长，推动覆铜板行业进入供给紧缺周期。记者采访获悉，目前部分高端覆铜板的交货期已延长至2周以上。同时，HVLP铜箔、低介电电子布等关键原材料供给持续趋紧，海外高端材料供应紧张，正为国产原材料厂商打开进入高端供应链的窗口。（上证报）
  url: https://36kr.com/newsflashes/3805573370830600
  source: 36kr.com
- title: 中信建投：科技与稀缺共振，战略金属及新材料迎强成长
  description: 36氪获悉，中信建投研报称，美元信用周期叠加康波周期（科技）支撑有色金属价格大幅上行。但本轮有色周期亦有其不同以往的显著特征：第一，源于供给刚性和需求韧性，本轮有色周期性大幅减弱，盈利稳定性大幅提高，权益资产估值应提升。第二，源于科技需求爆发，小金属本轮弹性极大，具备全球竞争力的新材料企业迎来爆发增长。当前时点除了贵金属和工业金属外要重点关注新质生产力元素尤其是铼、铀、锡、镍等，同时要重视具备全球细分领域竞争力的新材料企业，如AI芯片电感、AI芯片电容领域以及MIM和粉冶工艺在机器人的爆发带来的投资机遇等。
