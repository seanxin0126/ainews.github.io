- title: 中金：美元流动性扩张的引擎正在经历一场“大切换”
  description: 36氪获悉，中金指出，美元流动性扩张的引擎正在经历一场“大切换”。随着通胀从潜伏转向显现、主张缩表的新任美联储主席沃什上任，疫情后由美联储扩表与财政赤字共同驱动的外生货币时代或将步入尾声。与此同时，由AI资本开支驱动的内生货币扩张已然成型——流动性的引擎正从政策端走向实体端。内生货币扩张一方面增强经济韧性、加深通胀粘性，另一方面也推动资金从传统的房地产与消费领域，加速流向回报预期更高的科技前沿。未来，资产表现或继续分化：单纯依赖外生流动性驱动的资产将承受压力，而代表先进生产力方向的资产，则有望在内生货币的扩张中乘…
