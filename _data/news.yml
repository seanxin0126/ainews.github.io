- title: 英伟达推出全新服务器机柜，可兼容运行竞争对手的AI芯片
  description: 英伟达在人工智能芯片市场面临日益激烈的竞争。但这家芯片设计厂商找到了一条即便靠竞争对手芯片也能赚钱的新路径。在上周举行的年度GTC开发者大会上，英伟达发布了一款全新服务器机柜，该产品设计之初就支持运行英伟达自家芯片，同时也兼容其竞争对手的芯片。据两位了解该项目的知情人士透露，新型机柜搭载了英伟达的网络技术，可实现机柜内各芯片间的高速、稳定互联。（新浪财经）
  url: https://36kr.com/newsflashes/3736726283190535
  source: 36kr.com
