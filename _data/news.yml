  description: 马克 · 古尔曼在其最新一期《Power On》中提到，2018年从谷歌跳槽空降到苹果的前AI负责人约翰 · 詹南德雷亚确认将于本周正式结束其在苹果的“休整期”。古尔曼指出，自2025年3月苹果决定大幅削减其AI职责以来，他的离职就已然注定。
