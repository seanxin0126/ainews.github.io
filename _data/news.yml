- title: 苹果将允许用户选用多款第三方人工智能服务
  description: 苹果公司将允许用户从一系列外部人工智能服务中进行选择，为其软件各项功能提供支持。此举旨在推进将旗下设备打造为综合性AI平台的战略。知情人士表示，用户将能够在多个第三方AI模型中进行选择，用于生成和编辑文本及图像等任务。这项变化预计将于今年秋季随iOS
