- title: 硅谷的忠诚已死：只要价码足够高，任何人都可以被挖走
  description: "硅谷创始人与公司之间的“生死同盟”正在瓦解\n 硅谷，曾以“改变世界”为信仰的科技乌托邦，如今已沦为赤裸裸的人才角斗场。创始人与公司之间的“生死同盟”正在瓦解，取而代之的是一份份价值数亿美元的报价单和永不停歇的“转会”闹剧。\n\
    \ 自2025年中期以来，Meta、谷歌、英伟达三大巨头已经在所谓“收购性招聘”的游戏中豪掷超过360亿美元，这不是传统收购，而是对顶尖人才的直接掠夺。与此同时，OpenAI与Anthropic之间也上演着“你挖我墙角、我偷你核心”的滑稽循环，顶级研究员的年薪被推至千万乃至数亿美元，创始人不再相…"
