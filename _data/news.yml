- title: OpenAI自研芯片遇阻：博通要求微软采购四成产能
  description: OpenAI与博通AI芯片合作陷入融资僵局。据报道，OpenAI与芯片设计厂商博通去年官宣联合研发定制人工智能芯片时，双方曾将这笔合作视作板上钉钉的既定交易。数月过后，据一份内部备忘录及两名参与谈判的知情人士透露，双方正协商由博通出资推进芯片生产第一阶段建设。该阶段需消耗1.3吉瓦的数据中心算力容量，造价约180亿美元。按此成本测算，代号为“Nexus”、总规模10吉瓦的完整项目，仅芯片生产环节成本就高达1800亿美元，还未计入数据中心建设及其他配套开支。（新浪财经）
  url: https://36kr.com/newsflashes/3799898525047815
  source: 36kr.com
