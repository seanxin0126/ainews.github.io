- title: 36氪首发 | 斯坦福博士做分子检测平台，产品已进入北大、清华
  description: "作者 | 张子怡\n 编辑 | 袁斯来\n 硬氪获悉，广州洞察科技有限公司（以下简称“洞察科技”）于近日完成数千万元Pre-A轮融资。本轮融资由联想创投领投，力合金融、哇牛资本跟投，老股东天图资本和雅亿资本持续加注，芯湃资本担任本轮财务顾问。融资资金将用于晶圆级超高密度打孔机、超薄膜材料以及基因测序仪商业机的研发。\n\
    \ 固态纳米孔是一种以半导体工艺为基础的单分子传感平台。相比传统方案，该技术结构简洁，无需复杂的扩增与标记步骤，能够直接测量生物大分子的本征物理属性。在基因测序、癌症早筛和单分子分析中潜力巨大。\n\
    \ 洞察科技…"
  url: https://36kr.com/p/3735674146865160
  source: 36kr.com
- title: 阿里巴巴旗下公司同日成立2家新数据科技公司
  description: 36氪获悉，爱企查App显示，近日，杭州晓天数据科技有限公司、杭州衡宇数据科技有限公司成立，法定代表人均为魏虎，注册资本均为100万元人民币，经营范围包括互联网数据服务、软件开发、大数据服务、数据处理服务、人工智能基础资源与技术平台等。股权穿透图显示，上述2家公司均由阿里巴巴旗下浙江爱橙技术发展有限公司全资持股。
