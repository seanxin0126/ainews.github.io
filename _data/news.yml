- title: Anthropic與Mozilla合作，找出22個Firefox漏洞
  description: '人工智慧在資安研究領域的應用正快速升溫。AI業者Anthropic近日與開源瀏覽器開發者Mozilla合作，利用AI模型協助分析程式碼，在Firefox中發現22個安全漏洞，其中14個被Mozilla評定為高嚴重性（high-severity）漏洞。

    該研究主要由Anthropic的安全研究團隊進行，研究人員利用其大型語言模型Claude Opus 4.6來分析Firefox程式碼，並在兩周內提交多項漏洞報告。整體而言，研究團隊掃描了約6,000個C++原始碼檔案，向Mozilla提交112份問題報告，Mozil…'
