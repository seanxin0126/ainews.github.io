- title: IBM与红帽宣布投入50亿美元，推出人工智能驱动的开源安全计划
  description: IBM与红帽公司承诺投入50亿美元，打造全新开源软件模式，助力企业保障软件供应链安全。两家企业于周四公布，该项目命名为Project
    Lightwell。项目将集结全球两万名工程师，并依托先进人工智能技术，搭建可信企业信息交换中心。该中心将充当安全协调枢纽，借助前沿人工智能技术，对海量开源代码开展安全漏洞排查、检测与修复工作。（新浪财经）
