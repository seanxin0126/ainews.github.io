- title: 中信建投：算力需求持续强劲，NPO有望加速部署，继续看好AI板块
  description: 36氪获悉，中信建投研报表示，算力需求持续强劲，尤其是光连接，NPO有望先于CPO规模部署于Scale up，持续看好人工智能板块。
    专家认为，从可插拔光模块转向NPO/CPO的核心原因是Scale-up网络对带宽密度的需求，更低的功耗和更高的可靠性是NPO/CPO的另外两大重要优势。NPO可以依赖于成熟的可插拔光模块生态系统，同时在带宽密度和功耗方面提供显著改进。NPO是当前大规模部署中最实用、最具成本效益的解决方案。腾讯计划2026第四季度推出3.2T
    NPO解决方案，阿里的3.2T NPO已进入测试阶段。
