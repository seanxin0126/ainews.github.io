- title: 黑石盈利超预期，预计IPO将迎来“史上最佳年份”
  description: 黑石集团报告称，其可分配收益升幅超出预期，这主要得益于在伊朗战争动摇投资者信心之前，交易活动强劲开局。随着美国股市上涨以及人工智能企业准备上市，总裁Jon
