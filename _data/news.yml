  description: "作者｜苏子华\r\n\n编辑｜郑玄\r\n\n \r\n\n\r\n\n\n最近两年，AI 行业最热的词一直绕不开「算力」。\n从大模型训练，到今年\
    \ Agent 的火热，再到各家云厂商不断扩建智算中心，行业讨论最多的，几乎都是 GPU、芯片和算力规模。好像只要卡够多，AI 就能继续往前跑。\n但现实并不是。\n\
    不少做大模型训练和推理的人，已经越来越明显地感受到另一层问题：机器越来越贵，GPU 越来越强，但模型训练和推理的效率，却没有同步提升。\n问题不一定出在算力本身，而可能出在另一件长期被忽视的事情上——网力。\n\
