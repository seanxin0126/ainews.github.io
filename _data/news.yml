- title: 【2026 企業資安大調查｜資安人才需求】因應資安人才缺口， 3成CIO想靠AI緩解
  description: '資安人才向來是科技人力中的少數，在法遵要求上市櫃公司都得有一定規模不等的專責資安人力，不能再像過去靠資訊部門兼任之後，過去幾年，資安人才更成了超級搶手的人才，不分產業也都吹起了資安人才荒。

    隨著生成式AI的崛起，尤其過去兩年，科技大廠推出的資安AI助手越來越成熟，LLM挖掘軟體系統漏洞的能力也越來越強，生成式AI開始成了提升資安人才戰力的利器。這也讓企業開始意識到，可以運用生成式AI來緩解資安人才不足的壓力。

    在去年大調查中，我們開始調查資訊長和資安長對於AI緩解IT人才荒的看法，尤其是資安人才和開發人才缺口的緩…'
