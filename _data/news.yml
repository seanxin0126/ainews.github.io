- title: 博睿数据：OpenClaw是开源AI智能体执行框架，公司目前对此类技术尚无监控方案和产品
  description: 36氪获悉，博睿数据发布异动公告，公司股票于2026年3月9日、2026年3月10日连续两个交易日内收盘价格涨幅偏离值累计超过30%。根据《上海证券交易所交易规则》《上海证券交易所科创板股票异常交易实时监控细则》的有关规定，属于股票交易异常波动。公司主要为企业级客户的IT运维管理提供应用性能管理及可观测性解决方案。OpenClaw是开源AI智能体执行框架，公司目前对此类技术尚无监控方案和产品，未形成商业化应用，也未形成收入，对公司目前业务不构成影响。
