- title: 可灵AI两周年：全球用户突破1亿，企业客户近5万家
  description: 36氪获悉，正值上线两周年之际，可灵AI公布最新运营数据：截至2026年6月，全球用户突破1亿，较2025年底的6000万增长约67%，覆盖224个国家和地区；企业客户近5万家，较2025年底的3万家增长约67%。商业化方面，据快手2026年Q1财报，可灵AI单季营收超6.5亿元，同比增长超300%；2026年3月，ARR已接近5亿美元，1年内增长近400%。上线两年间，可灵AI从1.0版本演进至3.0
    Omni，过去一年完成26次迭代，累计发表论文122篇，开源项目21个。
