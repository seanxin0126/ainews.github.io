- title: Meta“带崩”科技股？业内人士：算力过剩系误读
  description: 7月2日，A股科技股大跌，半导体、算力硬件、存储芯片等板块跌幅较大。以科技股扎堆的“双创板”为例，创业板指和科创综指分别下跌5.71%和5.64%。从市场情况来看，A股科技股大跌源于Meta对外出售算力的消息被市场解读为算力过剩。然而，多位业内人士认为，该消息属于误读，Meta出售算力不是AI资本支出的结束，而是意味着AI基建商业模式成熟。（证券时报）
