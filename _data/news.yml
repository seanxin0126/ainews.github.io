- title: 中国入境游距离「世界第一」还有多远？
  description: "“曾有外国友人让我推荐中国的最佳旅行目的地，我的回答是：你应该看看中国的山。”\n 最近的一场入境游研讨会，携程集团联合创始人兼董事局主席梁建章这样回答。在他的表述中，中国有世界最高的山——喜马拉雅；全世界最美的山，则在中国南方最独特的喀斯特地貌——桂林。\n\
