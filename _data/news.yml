- title: 佛山市禅城区：推出面向公众的“小龙虾”免费部署服务
  description: 36氪获悉，佛山市禅城区政府官网刊发禅城区政务服务和数据管理局消息称，为助力市民进一步拥抱新技术、助力新经济，禅城区携手中国电信佛山分公司，推出面向公众的“小龙虾”（openclaw）免费部署服务。即日（3月9日）起，市民只需要携带个人电脑（支持macOS、Windows、Linux等跨平台）到中国电信禅城汾江南营业厅（或申请天翼AI云电脑服务），即可免费享受由中国电信客户服务工程师提供一站式服务，涵盖轻量化版本安装部署、模型配置及热门技能解锁。
  url: https://36kr.com/newsflashes/3716904175875717
  source: 36kr.com
- title: 合肥高新区推出15条举措“养龙虾”，最高予以1000万元资金扶持
  description: 36氪获悉，据合肥高新发布，近日，合肥高新区正式发布《合肥高新区打造人工智能OPC创业生态示范区行动计划（征求意见稿）》，推出15条举措，全方位护航OpenClaw等开源AI项目落地深耕，致力打造“AI+超级个体/一人公司（OPC）”新业态标杆。高新区已备好“空间+人才+算力+场景+资本”豪华大礼包，最高予以1000万元资金扶持。
