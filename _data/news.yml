- title: 新加坡啟用新AI超級電腦Aspire 2B，搭載逾1,500顆H200打造115PF總算力
  description: '新加坡國家超級電腦中心（NSCC）近期宣布新一代國家級超級電腦Aspire 2B正式投入運作，主打AI運算與大型模型訓練能力，其整體效能約為前一代系統提升數倍。

    Aspire 2B採用超過1,500顆的Nvidia H200 GPU，其峰值總運算力可達約115 PF，將投入當地的人工智慧、氣候模擬與科學研究等國家級應用。

    Aspire 2B在設計上明顯從過去以科學模擬為主的高效能運算（HPC），轉向以AI為核心的混合工作負載架構，包括大型語言模型（LLM）訓練與推論、氣候與環境模擬、量子運算與跨領域科學研究、政府…'
