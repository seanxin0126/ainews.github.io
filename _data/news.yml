- title: 谷歌称其首次发现黑客借助AI开发“零日”漏洞攻击工具
  description: Alphabet Inc．旗下谷歌的安全研究人员表示，他们相信，一个网络犯罪团伙利用人工智能开发出一款黑客工具，可绕过一款广泛用于管理计算机系统的软件中的防御机制。根据周一发布的一份报告，这一图谋在谷歌向该工具开发商发出警报后被挫败。报告称，这是谷歌的威胁情报团队首次发现黑客以这种方式使用人工智能生成的“零日”漏洞。所谓零日漏洞，是指开发商尚未知晓的缺陷，使防御方在漏洞被利用前没有时间打补丁。（新浪财经）
