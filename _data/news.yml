- title: Meta推出AI图像生成模型，接入聊天机器人和Instagram
  description: Meta Platforms Inc．发布一款新的图像生成式人工智能（AI）模型，这是该公司一年前斥资数十亿美元重建AI实验室、由Alexandr
    Wang担任首席AI官以来首次发布此类模型。该公司在博客文章中表示，这款名为Muse Image的模型周二上线Meta AI聊天机器人。它还将嵌入Meta旗下多款社交应用，包括Instagram和WhatsApp。用户可以利用该模型根据文本提示生成图像，也可以要求它修改现有图片。广告主也将很快能够使用该模型来制作营销材料。（新浪财经）
