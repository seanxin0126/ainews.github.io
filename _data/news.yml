  description: 36氪获悉，达实智能发布异动公告，经核查，公司近期生产经营情况、内外部经营环境未发生且未预计将要发生重大变化。目前市场热议的AIoT、液冷、智能机器人等概念对应的相关业务，尚不足以对公司经营情况构成重大影响。其中，2025年AIoT平台及AI应用签约金额为7,847.14万元，占公司2025年度营业收入比例较小。此外，公司不涉及液冷及机器人相关元器件的生产、制造等。敬请广大投资者理性判断、谨慎投资，注意投资风险。
