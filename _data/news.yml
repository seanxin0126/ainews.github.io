- title: 联讯仪器：预计上半年净利润同比增长802%-926%
  description: 36氪获悉，联讯仪器公告，预计2026年半年度归属于上市公司股东的净利润为5.10亿元-5.80亿元，同比增长802%-926%。业绩变动主要系受益于人工智能技术发展及全球算力需求提升，数据中心建设加速，带动高速光通信产品需求增长，推动公司通信测试仪器及光电子器件测试设备市场需求快速增长。
