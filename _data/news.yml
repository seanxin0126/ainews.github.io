- title: Anthropico计划下周向英国银行业发布其Mythos模型
  description: Anthropic PBC计划在未来一周内，向英国金融机构发布其备受关注的Mythos人工智能模型。这家科技公司在发现该模型是识别并可能利用网络安全漏洞的强大工具后，正逐步扩大“玻璃翼计划”。该项目旨在让特定机构提前获得这款人工智能的使用权限。Anthropic英国、爱尔兰和北欧业务负责人Pip
    White在接受媒体采访时表示：“这就在眼前了，会在下周内发生。正如你所预料的那样，过去一周我与英国首席执行官们的沟通非常密切。”（界面）
