  source: Cnbeta.com.tw
- title: 杨立昆：马斯克的xAI已失败 只能靠出租算力来收回成本
  description: "前Meta首席AI科学家、AMI Labs创始人杨立昆（Yann LeCun）最近在一次采访中表示，埃隆·马斯克的人工智能初创公司xAI是一个“失败”，无法在人工智能前沿领域展开竞争。他还阐述了自己对可能导致该行业“泡沫破裂”的看法。\r\
    \n杨立昆的言论再次引发了他与马斯克之间由来已久的争论，并令一些全球最大的人工智能公司的估值蒙受质疑。过去几年里，杨立昆与马斯克在人工智能以及他所称的特斯拉CEO在社交媒体上散布的“阴谋论”等诸多话题上都存在分歧。而马斯克则指责杨立昆“长期以来对人工智能一无所知”。杨立昆在最近的采访…"
  url: https://www.cnbeta.com.tw/articles/tech/1566238.htm
  source: Cnbeta.com.tw
- title: Anthropic首席执行官谈与OpenAI竞争关系：理念不合 各走各路
  description: "Anthropic首席执行官达里奥·阿莫迪（Dario Amodei）最近在一次访谈中表示，尽管全球两大人工智能公司之间的冷战正在酝酿，但他对Anthropic与OpenAI之间的竞争现状感到“平静”。不过，他还是忍不住对OpenAI首席执行官萨姆・奥特曼略加嘲讽。\r\
    \n在周三播出的一次访谈中，阿莫迪明显意有所指地抨击了奥特曼，他表示：“说到底，如果你和对方理念不合、彼此互不信任，又何必与其争辩？解决分歧的办法就是各走各路，我们做我们的，他们做他们的。对于我们坚持自身路线、对方走他们的道路这件事，我完全坦然释怀。”…"
  url: https://www.cnbeta.com.tw/articles/tech/1566230.htm
  source: Cnbeta.com.tw
