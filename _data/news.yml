- title: 黑石集团将牵头对人工智能公司Neysa投资6亿美元
  description: "以黑石集团为首的一批投资者计划对印度人工智能云初创公司Neysa进行最高6亿美元的股权投资。根据周一发布的声明，除此次股权融资外，Neysa还将寻求额外6亿美元的债务融资。公司计划利用这笔资金在印度部署超过20000块图形处理器（GPU），用于人工智能训练及高性能应用场景。\r\
