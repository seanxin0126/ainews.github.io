- title: 亚洲富豪挟250亿美元涌入AI领域，面对高估值毫无惧色
  description: 据报道，尽管对美国AI企业估值过高的疑虑渐起，亚洲富裕投资者仍向该领域投入数十亿美元的私人资本，毫无惧色。根据PitchBook数据显示，2025年亚洲高净值个人及家族办公室共向全球AI私募融资投入243亿美元。今年动能延续，截至4月8日，新增投资额已达9.5亿美元。这波投资热潮正值SpaceX、OpenAI和Anthropic
    PBC等行业巨头在募资中持续创下惊人估值。对亚洲富裕投资人而言，抓住世代级科技机会的吸引力，已超越潜在泡沫的风险。（新浪财经）
