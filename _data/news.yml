- title: 阿达尼计划投资千亿美元建数据中心
  description: 阿达尼集团计划至2035年投资1000亿美元，开发由绿色能源驱动的人工智能数据中心，显示亿万富翁Gautam Adani旨在抓住印度作为人工智能与云计算中心崛起的机遇。集团旗舰企业阿达尼企业有限公司在周二的公告中表示，这笔投资可能在未来十年“催化”额外1500亿美元投入，涵盖服务器制造、先进电力基础设施及相关行业。（新浪财经）
