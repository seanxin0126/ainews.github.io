- title: 政策周期业绩三重共振，高景气赛道公募持仓集中度抬升
  description: 当光模块龙头中际旭创市值逼近万亿元之际，公募对TMT（科技、媒体和通信）赛道的抱团趋势愈发极致。最新披露的部分基金一季报显示，不少权益基金仍在加仓中际旭创等人工智能（AI）龙头公司，对一些高景气赛道的持仓集中度进一步提升。伴随政策加持、行业景气度持续上行、企业业绩稳步兑现，市场此前预期的资产配置分散化并未出现，公募对TMT赛道的抱团趋势反而在加强，如AI、储能、半导体等高景气赛道，仍是机构资金的核心布局方向。（证券时报）
