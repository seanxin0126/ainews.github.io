- title: “开源中国”完成数亿元C+轮融资
  description: 36氪获悉，4月10日，开源与AI基础设施服务商“开源中国”宣布完成数亿元C+轮融资，由上海国投先导基金领投，中国互联网投资基金、君联资本、联想创投、苏创投及贝克资本联合跟投。截至目前，开源中国累计融资规模已接近20亿元。本轮融资资金将重点投向信创关键核心技术、AI基础设施建设、产业数字化升级以及自主可控技术突破等方向。
