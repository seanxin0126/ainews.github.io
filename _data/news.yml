- title: Anthropic遭國防部列供應鏈風險，三大雲端仍持續提供Claude服務
  description: '美國國防部（Department of Defense，DoD）近日將AI公司Anthropic列為供應鏈風險（Supply Chain
    Risk），引發科技產業關注。不過，微軟、Amazon與Google等雲端業者已向媒體表示，該決定並未影響其向企業客戶提供Anthropic Claude模型的服務。

    日前媒體披露，美國國防部已正式通知Anthropic，其公司與Claude模型被認定為供應鏈風險，未來與美國軍方合作的承包商或技術供應商，在政府相關系統中可能不得使用Anthropic技術。'
