- title: 国金证券：AI贸易占比高的地区均受益于本轮AI周期
  description: 36氪获悉，国金证券研报表示，全球AI投资周期正持续拉动全球AI贸易高增长，AI贸易占比高的地区均受益于本轮AI周期。1-2月出口高增是春节、低基数、AI贸易、企业加速出海等短期、长期因素共同作用的结果。随着短期影响结束，3月成为观察出口成色的重要窗口期。如3月出口超季节性，市场或需要进一步上修出口预期。
