- title: 众擎机器人增资至3206.8万，增幅900%
  description: 36氪获悉，天眼查App显示，近日，众擎机器人关联公司深圳众擎机器人科技股份有限公司发生工商变更，注册资本由约320.7万人民币增至约3206.8万人民币，增幅900%。该公司成立于2023年10月，法定代表人为赵同阳，经营范围含智能机器人的研发、智能机器人销售、工业机器人销售、人工智能双创服务平台、人工智能理论与算法软件开发、人工智能基础软件开发、人工智能通用应用系统、软件开发等。股东信息显示，该公司由赵同阳、Stone
    Robotics L.L.C-FZ、深圳市众鸣投资合伙企业（有限合伙）等共同持股。
