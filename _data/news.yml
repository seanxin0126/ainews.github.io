  description: 苹果公司备受期待的Siri重大升级将成为下一代iPhone、iPad和Mac软件更新的核心亮点。彭博制作的示意图展示了重新设计后的Siri界面、一款全新的聊天机器人应用，以及苹果计划在6月8日全球开发者大会（WWDC）上公布的其他iOS
