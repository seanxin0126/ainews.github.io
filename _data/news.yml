- title: 投中了理想、MiniMax 后，他说，AI 时代仍然要找「让人汗毛直竖」的创业者
  description: '时代确实变了，在科技圈和风投圈一直被认为是金字招牌的「非共识」，可能并不流行了。

    在明势创投的会议室内，身穿帽衫的创始人黄明明一脸不解的跟极客公园说：「大家一直给我们贴上「叛逆型投资人」，说好听点是『非共识』的标签。我觉得还挺奇怪的——世界大部分时候，是奖励『共识』的：光鲜的背景、快速的融资、简单能听得明白的故事，不是吗？而事实上，世界只有在很少的时间节点在奖励非共识。」

    作为互联网时代的创业者、有着十二年科技投资经历的明势创投创始人，黄明明带领团队在新能源时代押中了理想汽车，在 AI 时代又投出了 MiniMa…'
