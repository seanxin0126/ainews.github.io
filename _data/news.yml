- title: 俄羅斯新創公司 Neiry 啟動「生物無人機」早期實測，活體鴿子搭載神經介面引發關注
  description: 俄羅斯神經科技公司Neiry啟動「生物無人機」實地測試，利用腦機介面技術引導鴿子飛行。這項生物無人機技術不僅挑戰傳統無人機概念，更引發腦機介面應用於動物行為控制的倫理爭議。總部設於杜拜與莫斯科、核心業務在俄羅斯的神經科技公司
    Neiry，近年以腦機介面（BCI）裝置與演算法為主軸，產品橫跨消費型 EEG 頭戴裝置與動物侵入式神經植入技術。該公司約於 2018 年成形為集團架構，由創辦人
    Alexander Panov 主導，早期以行銷與科技業務起家，之後轉向神經科技領域，並獲俄羅斯國家創新基金體系資金支持。如今，…
