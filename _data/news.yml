- title: 匡智會學員作品亮相Art Basel　邱騰華：AI時代支援智障人士須與時並進
  description: 匡智會今年連續第三年參與於灣仔會展舉行的國際藝術盛事「巴塞爾藝術展」(Art Basel)，以「物潤留聲」為主題，展出多幅由智障學員創作的藝術作品。匡智會主席邱騰華表示，希望透過國際級平台展示學員才能，並強調在人工智能（AI）時代下，社會對智障人士的支援及工作機會須與時並進。邱騰華表示，匡智會自七十年代於大埔松嶺村總部設立小型院舍起步，發展至今已擴展至特殊學校、宿舍及職業訓練中心等多個領域。本次展出的作品，正是由學員親自回到松嶺村總部寫生創作，畫筆下不僅記錄了風景，更展現了匡智會及本港智障服務隨時代演變的歷程。
  url: https://hk.news.yahoo.com/%E5%8C%A1%E6%99%BA%E6%9C%83%E5%AD%B8%E5%93%A1%E4%BD%9C%E5%93%81%E4%BA%AE%E7%9B%B8art-basel-%E9%82%B1%E9%A8%B0%E8%8F%AF-ai%E6%99%82%E4%BB%A3%E6%94%AF%E6%8F%B4%E6%99%BA%E9%9A%9C%E4%BA%BA%E5%A3%AB%E9%A0%88%E8%88%87%E6%99%82%E4%B8%A6%E9%80%B2-043000951.html
