- title: Anthropic推出智能体AI工具，旨在实现人力资源、投资银行等领域工作自动化
  description: 据报道，在旗下AI工具引发市场暴跌并激起AI颠覆性影响的思考后，AI初创公司Anthropic PBC正在将其Claude聊天机器人的触角延伸至新的领域。该公司周二为其Claude
    Cowork智能体软件推出全新AI工具，旨在实现人力资源、投资银行和设计等领域工作的自动化。Anthropic表示，这些工具是与合作伙伴公司共同开发的，例如与金融数据提供商FactSet
    Research Systems Inc.合作创建的插件。（界面）
