- title: 蚂蚁集团安全团队发现OpenClaw多个高危漏洞并协助快速修复
  description: 36氪获悉，3月30日，据GitHub社区最新消息，蚂蚁AI安全实验室近期对开源自主智能体框架OpenClaw进行了专项安全审计。在为期三天的深度检测中，团队共提交了33个安全漏洞报告。其中，OpenClaw已在最新发布的2026.3.28版本中确认并修复了8个漏洞，包括1个严重级别漏洞、4个高危漏洞和3个中危漏洞。蚂蚁集团表示，将持续关注OpenClaw的安全风险，为产业界安全、稳健地应用AI智能体提供支持。
  url: https://36kr.com/newsflashes/3744930102149120
  source: 36kr.com
- title: 四部门：到2027年智能航运核心关键技术取得突破
  description: 36氪获悉，交通运输部、工信部、国资委、市场监管总局联合印发《智能航运2030行动计划》，到2027年，实现人工智能技术与航运要素广泛深度融合，智能航运核心关键技术取得突破。建立三个以上智能航运综合试点区域，开辟五条以上智能航运试点航线，打造十个以上可推广的智能航运典型场景，运营百艘以上智能船舶，制定一批技术标准，培养一批科技创新领军人才，实现典型场景智能航运多要素有效协同，航运业依托智能技术防控人为失误、降低劳动强度、提高生产效率的能力初步显现，形成航运发展的新动能。
