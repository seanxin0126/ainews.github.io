- title: 3连板中重科技：不涉及机器人及零配件的生产制造
  description: 36氪获悉，中重科技发布风险提示公告，公司主营业务为冶金领域智能轧制装备及成套生产线的研发、工艺设计、生产制造、技术服务与销售，核心产品为热轧型钢、带钢、棒线材、中厚板全流程自动化轧制生产线及配套备品备件，行业归类专用设备制造业，报告期内公司全部营业收入均来自上述冶金智能装备主业，公司主营业务未发生变化，不涉及机器人及零配件的生产制造。
