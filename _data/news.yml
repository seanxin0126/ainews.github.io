- title: 主动与量化“双向奔赴”，基金业探索超额收益获取新途径
  description: 今年以来多家公募基金公司加快探索主观与量化的融合路径，不仅将AI选股模型深度嵌入到投研流程，还在量化模型中深度引入主观逻辑因子，部分机构的主观与量化团队甚至一起开会拆解市场变化。私募业亦是如此。多位渠道人士透露，主打逻辑类因子和统计类因子有效结合的机构，今年以来备受资金青睐，主观+量化超融合策略也开始陆续出现。在业内人士看来，不断提高的交易复杂度、AI时代的来临，以及持续加快的市场变化，将加速模糊主观与量化投资之间的边界。（上证报）
