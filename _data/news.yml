- title: OpenAI与Anthropic合资企业洽谈收购AI服务公司
  description: OpenAI和Anthropic分别与私募股权公司成立的合资企业正在洽谈收购帮助企业管理人工智能系统的服务公司。据五位知情人士透露，OpenAI的合资企业Deployment
    Company已从TPG、贝恩资本等19家投资者处筹集约40亿美元，估值达100亿美元，目前有三笔交易进入后期阶段，主要目标是将数百名工程师和顾问纳入麾下。Anthropic则通过其合资企业筹集约15亿美元，投资者包括黑石集团、Hellman
    & Friedman和高盛。（新浪财经）
  url: https://36kr.com/newsflashes/3797027135315202
  source: 36kr.com
- title: Alphabet发行欧元和加元债券，合计融资近170亿美元
  description: 谷歌母公司Alphabet为支持人工智能（AI）投资，正在加大举债力度，在全球多个债券市场融资。Alphabet发行其史上规模最大的欧元计价债券，并首次发行加元债券，合计融资近170亿美元。几个月前，Alphabet发行了英镑和瑞郎计价债券，这也是该公司首次以这两种货币发债，当时还同步发行了美元债。（新浪财经）
  url: https://36kr.com/newsflashes/3797008763919368
  source: 36kr.com
