- title: 市场消息：Meta准备撤销对Manus的收购
  description: 媒体援引知情人士的话报道，Meta Platforms正准备撤销对人工智能（AI）初创公司Manus的收购。据报道，Manus的投资者——包括风险投资公司Benchmark——已经收回了投资。报道称，如果Meta推进撤销交易，包括腾讯、HSG和真格基金（ZhenFund）在内的多名亚洲前Manus投资方计划予以配合。（新浪财经）
