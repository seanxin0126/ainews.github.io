- title: 麥肯錫：88%企業導入AI、只有39%看見實際效益，關鍵在於改變流程
  description: '生成式AI（GenAI）熱浪席捲各行各業，從聊天機器人、Copilot到AI代理（AI Agent）應用都百花齊放。企業導入AI早已不是新鮮事，但如何將零散的AI單點試驗，擴大為大規模應用、真正創造商業價值，仍是許多企業面臨的挑戰。

    麥肯錫全球董事合夥人李曉廬（Denise Lee）在Computex 2026中指出，全球已有88%的企業在至少一個部門導入AI，但真正做到企業規模化應用的企業只有約三分之一，而能從AI創造明確商業價值的企業，也只有39%。

    她認為，企業下一階段的競爭關鍵，不再是導入多少AI工具，而…'
