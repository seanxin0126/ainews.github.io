- title: 巴西专家：外资2026年大举押注巴西和中国
  description: 巴西媒体《Money Times》日前刊登瓦加斯基金会（FGV）金融专家夏华声（Hsia Hua Sheng）题为《外国投资者在2026年重新大举押注巴西和中国》的文章称，2026年4月，全球投资者重新加大了对巴西和中国等新兴市场的配置力度。文章引用数据分析，中国正在经历一场结构性转型。2026年第一季度中国经济同比增长5%，增长主要集中在高技术制造、半导体、机器人、电池和人工智能等领域。这些行业在传统指数中的代表性仍然有限。许多指数仍然更多集中于银行、房地产、国有企业和传统工业领域。（新华财经）
