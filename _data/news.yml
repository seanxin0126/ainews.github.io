- title: 阿里健康与英国BMJ集团达成期刊内容独家合作
  description: 5月13日，阿里健康在杭正式发布医学AI“氢离子”，同时宣布氢离子与英国BMJ集团（BMJ Group）达成期刊内容独家合作。BMJ集团旗下70本医学期刊过往十年里发表的内容和多媒体资源将独家授权提供给“氢离子”，氢离子成为BMJ集团在中国独家合作的医学AI平台。中国医生可以通过氢离子直连全球顶级医学文献，进行循证问答、全文阅读、在线翻译，解决临床与科研过程中的医学问题。此外，氢离子透露，目前正与全球多家顶刊进行合作沟通。
