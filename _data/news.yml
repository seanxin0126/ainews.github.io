- title: 光通信全线预告高增，订单能见度充足
  description: 近期，新易盛、天孚通信、光迅科技、长飞光纤、亨通光电、永鼎股份、光库科技、长芯博创、剑桥科技、德科立、东田微等光通信上市公司纷纷披露2026年上半年业绩预告。作为产业链的风向标，它们的数据折射出整个行业的景气走向：行业整体迎来AI算力驱动的全线高增，光纤、光模块、光器件各环节盈利普遍改善，龙头与中小厂商分化加剧格局日益清晰。尽管多家光通信产业链公司股价近期出现大幅回调，但产业真实需求坚挺、订单能见度充足。（证券时报）
