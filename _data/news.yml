- title: 微软加倍押注AI，大胆下注采购3万块英伟达GPU
  description: 微软正在租赁一个位于挪威的数据中心场地，该场地此前与OpenAI的Stargate项目有关联。这家科技公司将向英伟达租赁3万块图形处理器，用于Nscale位于纳尔维克的230兆瓦园区。据知情人士透露，OpenAI曾就该设施进行过早期讨论，作为其Stargate项目的一部分，但双方未能达成协议。（新浪财经）
  url: https://36kr.com/newsflashes/3768217308529412
