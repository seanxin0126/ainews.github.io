- title: 外交部：中美同意开展人工智能政府间对话
  description: 5月19日，外交部发言人郭嘉昆主持例行记者会。有记者问，据报道，中美两国元首会晤时，就人工智能监管问题进行了交流，同意开展对话合作。中方对此有何评论？郭嘉昆表示，作为两个人工智能大国，中美双方应该携手促进人工智能发展和治理，推动人工智能更好服务人类文明进步和国际社会共同福祉。特朗普总统访华期间，两国元首就人工智能问题进行了建设性交流，同意开展人工智能政府间对话。（央视新闻）
