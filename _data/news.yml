- title: Xiaomi miclaw通过首批中国信通院可信AI手机端智能助手（Claw）评测
  description: 36氪获悉，近日，Xiaomi miclaw正式通过中国信息通信研究院手机端智能助手（Claw）评测，成为国内首个通过该评审的手机端智能体。本次评测依据《智能助手基准测试通用框架》，从基础能力、端侧应用、综合能力三大维度严格评测。据介绍，Xiaomi
