  description: '曾經稱霸運動攝影機市場的 GoPro，近期正面臨創立以來最嚴峻的營運挑戰。除了證實在全球大幅裁員約 23% 之外，同時也寄望搭載全新
    GP3 晶片的全新機型，能力挽其運動相機的市佔率和口碑表現。組織規模重整力拼轉型

    根據 GoPro 遞交給美國證券交易委員會（SEC）的文件顯示，為了降低營運成本並提升獲利槓桿，公司計畫在 2026 年底前裁減約 145 名員工，占總員工數近約
