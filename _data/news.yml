- title: 车企盈利分化加剧，谋划新增长极成共识
  description: 上市车企（含A股和H股）2025年年报渐次披露，行业营收整体保持增长态势，但盈利端呈现分化格局。整体来看，头部整车企业增长稳健，部分面临“增收不增利”的压力，数家新势力车企迎来盈利时刻。随着市场竞争加剧，车企纷纷加快战略谋局步伐，一方面深耕新能源、智能化，加速产品迭代和技术落地，另一方面布局出海、高端化，积极培育新增长极。（证券时报）
