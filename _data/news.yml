- title: 原工信部部长苗圩：让制造业成为人工智能科技创新和产业创新深度融合的主战场
  description: 全国政协常委、经济委员会副主任、原工业和信息化部部长苗圩在《人民日报》发表署名文章称，要进一步明确智能化转型升级方向，扩大智能制造和智能工厂示范范围，推进工业供应链智能协同，加强自适应供需匹配，推广人工智能驱动的生产工艺优化方法，让制造业成为人工智能科技创新和产业创新深度融合的主战场。支持政府引导基金与社会资本合作，设立更多专注硬科技和早期投资的专业子基金。鼓励龙头企业通过并购整合创新资源。
