- title: 2连板双星新材：公司MLCC离型膜主要应用于消费电子和汽车电子用领域，暂未涉及AI算力相关应用领域
  description: 36氪获悉，双星新材公告，目前公司MLCC离型膜的营业收入占公司整体营业收入比例未达1%，公司MLCC离型膜主要应用于消费电子和汽车电子用领域，因AI算力相关产品技术壁垒较高，公司暂未涉及AI算力相关应用领域。公司生产的MLCC离型膜是MLCC流延涂布工艺成型步骤耗材，成本占比大约在10%-20%,该业务短期内对公司业绩影响很小，敬请广大投资者注意投资风险，理性决策，审慎投资。
