- title: AI算力产业链成为上海出口重要增长动能
  description: 从上海海关获悉，上半年，上海制造的服务器、光收发模块、集成电路、工业级变压器、储能电池等人工智能（AI）相关产品出口均实现快速增长，AI算力产业链已成为上海出口的重要增长动能。上海海关统计分析处副处长李计融认为，上半年，上海AI相关产品出口的快速增长，是集成电路、人工智能等先导产业迭代驱动的结构性、持续性增长。相较传统外贸品类的平稳增长，AI相关产业链的带动性较强，从上游储能电力设备等基础配件，到中游集成电路、固态硬盘等算力硬件，再到下游计算机服务器，AI产业打通了上海高端电子外贸全链条，实现全品类协同增长。（新…
