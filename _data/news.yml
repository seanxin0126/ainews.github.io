- title: 36氪专访 | 秘密递表后认购超5000倍，华沿机器人CEO说想再低调一点
  description: "作者丨欧雪\n 编辑丨袁斯来\n 华沿机器人CEO王光能在生活里，是个有些无趣的人。他不抽烟、不喝酒、不打麻将，最近才刚学会掼蛋。他有房子在南山区，但平时吃在公司食堂，住在公司旁的城中村。\n\
