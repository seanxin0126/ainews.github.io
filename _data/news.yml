- title: AI创企ElevenLabs或洽谈要约收购，估值或达220亿美元
  description: 据报道，人工智能初创公司ElevenLabs与投资者初步洽谈，拟允许员工在二次发行中出售股份，这笔交易对该公司的估值可能达到220亿美元左右。这一估值可能是该公司在2月融资轮后身价的两倍。知情人士表示，预计此次要约收购将在9月前进行。相关讨论仍处于初期阶段，可能发生变化。（界面）
