- title: “智象未来”完成超5亿元新一轮融资
  description: 36氪获悉，近日，国内多模态生成式人工智能公司“智象未来”宣布完成超5亿元新一轮融资。本轮融资由东方富海、安徽省投资集团旗下的省产业投资公司、峰华资本等新股东联合投资，同时合肥产投、兴泰集团、合肥高投、安徽省人工智能母基金等老股东持续加注。本轮融资将主要用于智象独创的下一代原生全模态世界模型研发、企业服务智能体的产品建设以及全球市场拓展。
  url: https://36kr.com/newsflashes/3767915932893699
  source: 36kr.com
- title: 氪星晚报｜Snap宣布将裁员约1000人；字节启动新一轮期权回购；苹果CEO库克斥资106万美元增持耐克
  description: "大公司：\n Snap宣布将裁员约1000人\n 4月15日，社交媒体公司Snap宣布一系列调整，这些调整将影响Snap约1000名团队成员，包括16%的全职员工，此外，公司还将关闭300多个空缺职位。通过调整，公司预计到2026年下半年，年度成本将减少超过5亿美元。Snap表示，对即将离职的美国团队成员，公司将提供四个月的遣散费、医疗保险和股权激励，以及职业转型支持。在美国以外地区，公司将遵循当地流程，并努力提供符合当地规范的同等支持。\n\
