- title: ASML 全力擴產 EUV！年產目標衝破 60 台，AI 熱潮帶動先進製程設備需求
  description: '面對AI算力井噴式需求，ASML正以前所未有的速度擴大其EUV光刻系統產能。ASML的EUV設備是先進晶片製造的關鍵，這場擴產競賽不僅關乎ASML的未來，更決定全球AI時代的科技主導權。荷蘭半導體設備巨頭艾司摩爾（ASML）正以前所未有的速度擴大其極紫外光（EUV）曝光系統的產能。為了滿足全球因
