- title: OpenAI收購Astral，AI寫程式邁向開發流程代理人
  description: 'OpenAI週四（3/19）宣布將收購Python開發工具公司Astral，計畫將其開源工具與工程團隊整合至Codex體系，加速AI在軟體開發全流程的能力布局。雙方並未公布交易金額，仍待監管核准。

    Astral成立於2021年，由Charlie Marsh於美國創立，是近年快速崛起的Python開源工具公司。其核心產品包括uv、Ruff與ty，分別用於套件與環境管理、程式碼檢查與格式化，以及型別檢查，已成為現代Python開發流程的重要基礎設施，並累積數億次下載。'
