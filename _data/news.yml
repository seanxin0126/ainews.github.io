- title: 度小满发布面向AI Skill开发者的支付解决方案ClawPay
  description: 36氪获悉，5月13日，Create 2026百度AI开发者大会上，度小满发布了面向AI Skill开发者的支付解决方案“度小满ClawPay”。该产品将计费、下单、支付唤起等能力封装为标准化技术服务，帮助开发者零代码完成支付模块嵌入。开发者入驻后，平台提供从计费到支付接口调用的端到端技术服务。与需要开发者自行编码实现计费和下单功能的方案不同，度小满ClawPay将计费引擎、订单管理和标准化支付组件全部内置于平台层。
