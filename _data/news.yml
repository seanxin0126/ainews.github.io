- title: 生态环境部：拟自2027年起，禁止生产以HCFC-22为制冷剂的多联式空调（热泵）机组产品
  description: 36氪获悉，生态环境部发布《关于禁止生产以一氯二氟甲烷(HCFC-22)为制冷剂的多联式空调(热泵)机组产品的公告(征求意见稿)》。其中提到，根据《消耗臭氧层物质管理条例》有关规定和《中国履行〈关于消耗臭氧层物质的蒙特利尔议定书〉国家方案(2025—2030年)》要求，多联式空调(热泵)机组行业将全面禁止使用一氯二氟甲烷(HCFC-22)作为制冷剂。自2027年1月1日起，禁止生产以HCFC-22为制冷剂的多联式空调(热泵)机组产品。
  url: https://36kr.com/newsflashes/3760608913081093
  source: 36kr.com
