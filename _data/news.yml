- title: OpenAI据悉从Meta挖来AI大牛庞若鸣
  description: 据The Information报道，OpenAI已从Meta挖来了知名人工智能研究员庞若鸣，后者曾领导苹果的AI模型团队，大约七个月前刚从苹果加入Meta。此前有报道称，庞若鸣去年加入Meta时获得了价值超过2亿美元的薪酬方案，分几年支付。据报道，在OpenAI积极招揽他数月后，庞若鸣于上周离开了Meta公司。（新浪财经）
  url: https://36kr.com/newsflashes/3699729593053064
  source: 36kr.com
- title: 王兴兴回应德国总理参观宇树
  description: 德国总理默茨26日抵达浙江杭州，继续中国之行，根据行程，默茨将参观中国机器人企业宇树科技。宇树科技董事长王兴兴在接受采访时表示自己深感荣幸，他说，此次活动是一个建立与德国更多企业合作的窗口，以及在全球范围内共同推动智能机器人产业发展的契机，德国市场潜力巨大，相信智能机器人和AI产业的良好发展态势，对行业发展和全人类都有非常好的作用。（中新网）
