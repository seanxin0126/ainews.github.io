- title: 马斯克限制特斯拉员工AI开支
  description: "埃隆·马斯克已将特斯拉员工在人工智能方面的每周开支上限定为200美元（150英镑），在企业纷纷寻求控制失控账单之际迈出了限制步伐。特斯拉员工已被告知，从周一开始他们对AI的使用将受到限制。\r\
    \n该上限不适用于马斯克自有的AI系统Grok，该系统在与Anthropic的Claude、ChatGPT和谷歌Gemini等竞争对手的较量中表现不佳。许多大公司此前一直推动员工尽可能多地使用人工智能，希望借此提高生产率。马斯克今年早些时候曾表示，人工智能将使每位特斯拉员工的“产出”变得“难以置信地高”。但推动使用人工智能已导致…"
