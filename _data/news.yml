- title: 前华为员工创业线控底盘，曾参编国标，获松禾、苏高新投资丨36氪首发
  description: "作者丨欧雪\n 编辑丨袁斯来\n 硬氪获悉，线控底盘核心零部件供应商毫秒智控已于近期完成数千万元天使+轮融资，本轮投资方为松禾资本和苏高新融晟。这也是公司成立仅一年以来，继获得厚雪资本天使轮独家投资后，接连完成的第二轮融资。\n\
