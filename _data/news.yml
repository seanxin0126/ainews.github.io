- title: 拒絕幫自己訓練「數位替身」！Meta 員工強烈反彈，逼使官方收縮滑鼠追蹤計畫
  description: 'Meta 強制記錄滑鼠軌跡以訓練 AI 代理，引發了激烈的員工反彈。員工拒絕為取代自己的技術提供素材，迫使 Meta 在員工反彈下收縮計畫。這場
    AI 代理爭議，深刻揭示了科技巨頭在追...科技巨頭 Meta 近日在一份內部備忘錄中宣布，將縮減收集員工滑鼠移動、鍵盤敲擊等行為數據來訓練 AI 的計畫。這起事件起因於
    Meta 上個月決定在美國員工的辦公電腦上強制安裝追蹤軟體，記錄所有微小的操作軌跡。

    然而，這項計畫隨即在內部引發了極為強烈的反彈與抗議，員工們普遍拒絕配合這項本質上是「教 AI 搶走自己飯碗」的資料…'
