- title: 人工智能芯片制造商Cerebras Systems的IPO定价每股185美元，IPO规模为今年最大
  description: 人工智能芯片制造商Cerebras Systems完成美国首次公开发行，募资55.5亿美元，顺势把握住全球半导体需求暴涨的风口。公司发行价定为每股185美元，高于此前推介定价区间。Cerebras周一已上调发行区间与发行股份数量，本次IPO原计划发行3000万股，定价区间为每股150至160美元。依据申报文件中的发行股份及流通股本计算，此次定价使Cerebras市值约400亿美元。数据显示，本次IPO为今年迄今规模最大。（新浪财经）
  url: https://36kr.com/newsflashes/3808378338123272
  source: 36kr.com
