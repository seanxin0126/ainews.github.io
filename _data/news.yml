- title: 近1700家A股公司披露上半年业绩预告，三大高景气赛道上市公司描绘增长新曲线
  description: A股上市公司半年报业绩预告迎来密集披露期。截至7月16日19时，已有1697家A股上市公司披露上半年业绩预告，呈现显著结构性特征，人工智能（AI）算力、机器人、创新药产业迎来业绩兑现期。这三大赛道上市公司的业绩保持较高增速，既是市场需求驱动的产业周期上行信号，也是新旧动能转换的风向标。专家表示，当前新旧动能转换进程持续，AI算力、机器人、创新药等行业的上市公司迎来业绩集中爆发。这种情况的出现将持续拓展国内新质生产力企业长期增长空间，助力产业穿越周期，筑牢经济增长基本盘。（中证报）
