- title: 阿联酋宣布禁止15岁以下未成年人使用社交媒体
  description: "阿拉伯联合酋长国近日公布新的监管规定，将社交媒体的使用最低年龄门槛设定为15岁，成为首个实施此类禁令的阿拉伯国家。 根据这项新规，15岁以下儿童将被全面禁止在各类社交平台上开设、使用或运营个人账户，不得发布内容、发表评论、分享信息，也不得加入公开群组。\r\
    \n新规同时对15至16岁人群作出差异化安排：这一年龄段的未成年人在特定条件下仍可使用社交媒体，但需接受“适龄内容控制”，并受到与陌生用户互动的限制、屏幕使用时间管理工具，以及家长监管功能等多重约束。为落实年龄限制，阿联酋要求社交媒体公司必须上线有效的年龄核验机制，…"
  url: https://www.cnbeta.com.tw/articles/tech/1566208.htm
  source: Cnbeta.com.tw
