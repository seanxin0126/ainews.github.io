- title: 黄仁勋：SK海力士、三星、美光已通过认证，将量产最新AI内存
  description: 英伟达CEO黄仁勋表示，三大内存芯片制造商已获准为英伟达AI加速器供应最先进的高带宽产品。这一决定意味着SK海力士、三星电子和美光科技可开始量产并供应HBM4，即用于英伟达AI加速器的最新一代芯片。这三家企业主导着全球计算用存储半导体市场，此前一直在激烈争夺该业务份额。黄仁勋在抵达首尔进行为期数日的访问时告诉记者：“三家供应商均已通过认证。”他补充道：“三家企业都已投产，都在竞相支持Vera
    Rubin。”Vera Rubin是英伟达最新AI芯片。（新浪财经）
