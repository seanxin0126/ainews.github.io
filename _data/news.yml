- title: SpaceX上市首个交易周收高 较IPO价格上涨37%
  description: "SpaceX股票上市首个交易周收高，尽管其剧烈震荡显示，即便是史上规模最大的首次公开募股（IPO），也难免遭遇大型公司上市后常见的股价波动。埃隆·马斯克旗下这家火箭、卫星和人工智能公司股价周四下跌3.6%，两日累计跌幅达8.3%。\r\
    \n尽管如此，上市首个交易周结束时，该股收盘价仍较135美元的IPO价格高出37%。按收盘价计算，公司总市值为2.4万亿美元，成为全球市值第六大公司。“经历这样的涨势后，一两天下跌看起来更像是涨势疲态，而不是基本面出了什么问题。IPO后股价几乎直线上涨，流通股非常少，到某个时候买家就是需…"
