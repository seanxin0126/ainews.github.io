- title: Anthropic发布面向金融服务公司的新型AI智能体
  description: Anthropic PBC 推出了一系列新的AI智能体，旨在处理更广泛的金融服务任务。据称这些智能体可以撰写客户会议的演示文稿、审核财务报表，并将案件上报进行合规审查。这十款新工具的目标用户是银行、保险、资产管理和金融科技领域的专业人士。Anthropic首席执行官Dario
    Amodei将于周二在纽约举行的Anthropic活动上与摩根大通首席执行官Jamie Dimon一起发表关于人工智能的演讲，届时银行业领袖也将出席。（财联社）
