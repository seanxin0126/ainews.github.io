- title: 两部门：深入实施“人工智能+三品”专项行动，建设一批行业大模型和高质量数据集
  description: 36氪获悉，工业和信息化部办公厅、文化和旅游部办公厅发布关于组织开展2026消费名品全国行的通知，活动时间2026年5月—2027年4月。其中提出，深入实施“人工智能+三品”专项行动，分行业分领域发布实施人工智能赋能应用指南，建设一批行业大模型和高质量数据集。聚焦体验制造、时尚消费、银发经济、绿色生产、健康生活等重点领域，深入挖掘一批创新产品、关键技术与应用场景。组织征集数字化转型典型案例（“数字三品”方向），加快形成一批可复制、易推广的案例范本，以技术创新驱动消费品产业提质升级。
