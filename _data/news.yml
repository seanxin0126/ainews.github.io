- title: 杰瑞股份：2026年以来与美国四客户签署燃气轮机发电机组合同累计超9亿美元
  description: 36氪获悉，杰瑞股份在投资者关系活动记录表中披露，2026年以来公司共与美国四个不同客户签署四份燃气轮机发电机组销售合同，累计合同金额超9亿美元。随着全球人工智能高速发展，数据中心用电需求持续增加，燃气轮机发电市场需求空间广阔。在业务规划方面，燃气轮机发电设备业务是公司电力业务板块布局之一。电力板块将在数据中心、工业能源和新型电力系统三大赛道持续深耕，不断拓展不同领域业务，构建多元化客户群体。未来，电力板块的战略地位与重要性将进一步凸显，与公司各产业集群共同支撑公司高质量发展。
