- title: 独家｜字节 AI 制药开启拆分融资，AI4S 进入产业化阶段
  description: "文｜周鑫雨\n 编辑｜张雨忻\n 《智能涌现》独家获悉，字节跳动 AI 制药业务线已启动拆分与独立融资进程。\n 据悉，拆分后字节仍将控股新公司，AI\
    \ 制药核心团队、核心算法、技术平台和已有管线资产将整体进入新主体。同时，该业务也将继续从火山引擎获得算力支持。\n 新公司将由字节跳动 AI 制药团队主导负责。字节\
