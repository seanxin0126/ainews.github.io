  description: "英特尔近日宣布，已聘任前 SK 海力士社长兼 CEO 李锡熙（Seok-Hee Lee）出任英特尔晶圆代工事业（Intel Foundry）执行副总裁，全面负责先进封装、系统集成、后段技术开发及后段制造，并直接向英特尔\
