- title: 适用人工智能领域 教育部、国家语委发布两项语言文字新规范
  description: 为积极回应人工智能时代对语言文字的现实需求，推进语言文字规范标准体系建设，近日，教育部、国家语言文字工作委员会发布《机器合成普通话水平测评等级标准及测评大纲》和《人工智能
    语料库 基础术语》两项语言文字规范。两项规范由教育部语言文字应用研究所（国家语委普通话与文字应用培训测试中心）组织研制，经国家语委语言文字规范（标准）审定委员会审定通过，目前已由语文出版社正式出版。（央视新闻）
