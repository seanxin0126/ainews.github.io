  source: Cnbeta.com.tw
- title: 国产GPU越来越会赚钱：4家厂商芯片毛利率超过50% 最高近70%
  description: "过去的一年中国产GPU中的四大——摩尔线程、沐曦、壁仞及天数智芯都已经IPO上市，市值最高的摩尔线程一度达到5000亿元，目前已经回落到2700多亿。\r\
    \n上市之后，这四家公司也陆续公布了年报，营收普遍在10-20亿之间，其中天数智芯去年营收10.34亿，壁仞去年营收10.35亿，摩尔线程营收15.06亿，沐曦营收最高，但也就是16.44亿元。这四家GPU上市公司还是巨额亏损的，最少亏损的天数智芯去年亏了4.4亿，沐曦亏了7.9亿，摩尔线程亏了10.2亿，壁仞亏了18亿，是最多亏损的一家。好消息是他们的亏损额相比之…"
