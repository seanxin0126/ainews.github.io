- title: 印度拟重振私人资本对高速公路的投资
  description: 印度正努力吸引私人资本重新进入公路建设领域。十年前，投资者因担忧收益风险与官僚审批拖延而纷纷撤离该领域。据知情人士透露，印度政府正制定新规，承诺为开发商提供收益保障，并邀请全球基金参与项目竞标，以加快高速公路建设。上述不愿具名的人士表示，该政策框架预计将于本月敲定，目标是在
    2027 财年前向私营部门授予价值 1 万亿卢比（约 110 亿美元）的项目。他们还称，总理纳伦德拉・莫迪政府希望明年私人投资在公路建设中的占比最高达到25%，而目前这一比例仅为较低的个位数。
