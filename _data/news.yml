  description: "中国最大的半导体企业中芯国际(SMIC)创始人张汝京在最新一次采访中表示，认为在半导体行业取得成功就必须能够制造3nm或2nm芯片，这是一种误解。他认为，瞄准特定细分市场才是更为重要的发展方向。\r\
