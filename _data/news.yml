- title: 近千只主动权益基金净值创新高，科技浪潮成净值修复核心动力
  description: 近两年，以人工智能、半导体为代表的科技股行情持续升温，成为推动A股市场结构性回暖的核心动力。在这轮行情中，一批主动权益基金凭借对科技方向的提前布局，交出了颇为亮眼的成绩单。值得提及的是，傅鹏博、谢治宇、萧楠、冯明远等投资老将所管理的基金，近期也纷纷刷新了历史高点。这些基金的净值曲线5年来走出了一条完整的“U形”——从巅峰坠入深坑，再一步步爬出新高。这背后是市场风格的轮转，也是产业浪潮的更迭，更是部分主动基金基金经理在逆境中对原有投资框架的笃行。（证券时报）
