- title: Anthropic宣布正式封杀OpenClaw
  description: 美国大模型头部公司Anthropic旗下AI编程工具Claude Code负责人Boris Cherny发文称，美国西部时间4月4日中午12点起，Claude订阅服务将不再包含对OpenClaw等第三方工具的使用额度。团队一直在努力满足Claude需求的增长，而订阅并非为这些第三方工具的使用模式设计。容量是团队谨慎管理的资源，会优先考虑客户使用产品和API。（第一财经）
  url: https://36kr.com/newsflashes/3751993972802307
  source: 36kr.com
- title: 原小米字节硬件高管徐睿加入Meta 将领导新组建的AI硬件团队
  description: "4月4日，据爱范儿报道，原小米、字节跳动硬件业务高管徐睿，将成为Meta旗下的MSL（超级智能实验室）新组建的AI硬件团队的负责人。据了解，由Alexandr\
    \ Wang领导的MSL将成立一个全新的AI硬件团队，徐睿将参与该新部门的组建和领导工作。\r\n据悉，徐睿曾经在小米、字节跳动、英特尔、亚马逊、联想等互联网科技公司担任硬件业务专家和负责人。2015年-2017年期间，徐睿在小米工作，曾管理小米电视全球团队，负责分析全球智能电视和机顶盒市场，制定了小米电视全球产品路线图，是早期的小米电视/盒子团队的核心成员之一，…"
