- title: 挚达科技全球首发“AI能源+机器人”一体化解决方案
  description: 36氪获悉，7月16日，挚达科技发布企业2.0战略及两大全场景解决方案，分别为“AI能源+机器人”一体化家庭场景解决方案和“AI能源+机器人”一体化公共场景解决方案。两套方案以家用、公共自动充电机器人为核心，搭配光伏、储能、充电设备，依托AI数字平台形成一体化体系，分别面向家庭住宅和公共运营场站，实现能源管理、任务调度与充电作业的全链路协同。
