- title: 摩根大通称投资者可利用股市疲软机会增加配置
  description: 摩根大通策略师表示，投资者可利用股市走弱之时增加股票配置，尽管地缘政治风险消息频出，但军事、政治和经济方面的制约因素意味着局势不太可能长期升级。尽管小摩策略师对“人工智能风险股”持谨慎态度，但认为这些股票短期内可能出现战术性反弹，不过最终会在12-18个月利用反弹机会卖出。小摩仍高配新兴市场而非发达市场，并且对矿业板块保持乐观。（财联社）
