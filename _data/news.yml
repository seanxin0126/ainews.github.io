  description: 36氪获悉，猎豹移动发布2025年第四季度及全年财报。财报显示，2025全年总收入达11.504亿元，同比增长42.6%，Non-GAAP营业利润为1421万元。AI及其他业务成为公司新的增长引擎，2025全年收入达5.352亿元，同比增长85%，占全年总收入的46.5%；其中Q4
