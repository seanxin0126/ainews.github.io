- title: 2连板长飞光纤：全球光纤光缆行业处于上行周期，但部分产品的价格波动幅度存在不确定性
  description: 36氪获悉，长飞光纤公告，公司股票连续两个交易日收盘价格涨幅偏离值累计超过20%，属于股票交易异常波动。公司注意到近期市场对应用于人工智能数据中心的相关光纤光缆价格波动关注度较高。当前，由于国内外算力基础设施建设持续加速，全球光纤光缆行业处于上行周期，但部分产品的价格波动幅度存在不确定性，其对公司业绩的影响需要结合市场环境和公司业务结构情况进行综合判断，敬请广大投资者注意投资风险，理性决策，审慎投资。
