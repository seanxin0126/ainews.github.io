- title: 张家口银行增资至121.5亿，增幅约15%
  description: 36氪获悉，天眼查App显示，近日，张家口银行股份有限公司发生工商变更，注册资本由约105.6亿人民币增至约121.5亿人民币，增幅约15%。
    该公司成立于2001年10月，法定代表人为高毅峰，经营范围包括吸收公众存款，发放短期、中期和长期贷款，办理国内结算，办理票据承兑与贴现等，由张家口市张融城市信用合作社、张家口市明德城市信用社合作社、张家口市维克电缆有限责任公司等共同持股。
