- title: AI驱动新一轮增长周期，云厂商迎来业绩拐点
  description: AI带来的需求增长正逐步扭转中国云厂商长期以来的亏损局面。近期，金山云发布的最新财报显示，2025年第四季度公司实现营收27.6亿元，同比增长23.7%，并连续两个季度实现经调整经营利润转正。腾讯披露的财报显示，2025年腾讯云在历经多年亏损后，首次实现规模化盈利。业内人士分析，长期以来，受制于低价竞争，中国云计算行业整体盈利能力偏弱。但随着AI需求的爆发，行业格局正发生深刻变化。尽管云服务上游同样面临供应链涨价压力，但在AI时代，云厂商的议价能力有望得到提升。（上证报）
