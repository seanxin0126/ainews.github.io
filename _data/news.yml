- title: 3连板金安国纪：公司覆铜板主要客户为PCB厂商，未发现在AI服务器及算力领域的应用
  description: 36氪获悉，金安国纪公告，公司覆铜板主要产品包括各种通用FR-4、CEM-3等系列覆铜板和特殊指标要求的无卤无铅环保、高阻燃、耐CAF、高Tg、高CTI等系列覆铜板及铝基覆铜板、半固化片等，主要客户为PCB厂商，未发现在AI服务器及算力领域的应用。公司目前高频高速覆铜板产品尚在实验室研发及客户送样阶段，尚未形成收入，其中一款介电常数Dk3.81（10GHz）及介质损耗Df0.0047（10GHz）的高速覆铜板正在向境内客户送样中，能否通过客户认证存在不确定性。
