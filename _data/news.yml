- title: Anthropic启动员工出资政治行动委员会 为大选季加码政治捐款
  description: "美国人工智能公司 Anthropic 正在筹建一支新的企业政治行动委员会（PAC），成为最新一批在大选季通过员工出资方式参与竞选资金博弈的科技企业之一。\
    \ 4 月 3 日，该公司主体 Anthropic PBC 向联邦选举委员会递交组织声明，宣布成立名为“AnthroPAC”的委员会。 据悉，该 PAC 的资金将完全来自\
    \ Anthropic 员工的自愿捐款，这是科技公司向竞选项目投入政治资金的常见做法。\r\nAnthroPAC 预计将以两党路线运作，向民主、共和两党候选人提供捐助，其运作将由一个两党背景的董事会进行监…"
