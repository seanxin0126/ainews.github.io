- title: 36氪首发丨上科大博士团队加速国产超高速光电探测芯片量产，获千万级天使轮融资
  description: "图源/企业\n \n 本文约2000字，建议阅读5分钟\r\n\n \n 作者丨欧雪\n 编辑丨袁斯来\n 硬氪获悉，上海快粼光电科技有限公司（以下简称“快粼光电”）近期已完成数千万元天使轮融资。本轮融资由小苗朗程领投，一村资本跟投。中岚科创担任长期财务顾问，提供产业协同和资本对接服务。此次募集资金将主要用于公司超高速光探测芯片的研发迭代与送样验证，加速国产光探测芯片量产进程以及企业高端人才引进。\n\
    \ 快粼光电2024年成立于上海，是一家专注于III-V族高速光电探测芯片的研发与产业化的硬科技公司，曾在AI光互联与6G通信核心的光…"
