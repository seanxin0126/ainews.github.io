- title: 南京栖霞区、江宁区发布“养龙虾”政策
  description: 36氪获悉，南京栖霞区发布《关于支持OpenClaw等开源AI智能体工具与OPC融合发展的若干措施》。其中提到，依托栖智OPC云平台，为开发主体免费提供OpenClaw等部署服务及配套开发工具包，集成主流AI开发框架、开源代码库实现生产要素快速调用。对入驻OPC社区的开发主体，给予相应额度的免费算力资源和国内头部大模型API调用费用补贴，支持按小时、按天租用“弹性算力”，降低开发初期技术成本。此外，位于南京江宁开发区紫金山科技城的OPC社区“紫金星辰”推出“龙虾六条”专项政策，从算力、空间、资本、人才、场景、服务…
