- title: 10只液冷概念股年内获融资资金净买入超1亿元
  description: 随着头部企业落地全液冷算力架构，叠加各地算力能耗管控政策不断收紧，多重驱动因素形成共振，液冷技术已然成为超高密度AI算力中心建设刚需，行业渗透速度持续加快。A股市场方面，今年以来，液冷概念股平均涨幅超19%，其中冰轮环境、鼎通科技和申菱环境均涨超144%。从年内机构调研情况来看，19只液冷概念股获得机构调研，其中三花智控、鼎通科技、冰轮环境、领益智造和银轮股份等个股年内获得多家机构调研。资金方面，有10只液冷概念股年内获融资资金净买入超1亿元，包括巨化股份、申菱环境、飞龙股份和高澜股份等。（证券时报）
