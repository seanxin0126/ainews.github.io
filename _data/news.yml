- title: 智慧手機市場「慘」！美伊衝突、記憶體飆漲，全球出貨量恐再下修13.9%
  description: '受美伊衝突與記憶體晶片短缺影響，智慧型手機市場正迎來史上最糟一年。全球出貨量大幅下滑，智慧型手機市場的未來出貨量面臨嚴峻挑戰。 

    持續不斷的美伊衝突以及價格暴漲的記憶體晶片，正在讓智慧型手機市場愁雲慘淡。市場研究公司 IDC 此前預測，受人工智慧驅動的記憶體短缺影響，今年全球智慧型手機出貨量將下降
    12.9%。但周二，該公司預測降幅將更大，達到 13.9%，原因是美伊衝突進一步削弱了市場需求。

    該公司在研究報告中表示，智慧型手機市場正走向有史以來最糟糕的一年。

