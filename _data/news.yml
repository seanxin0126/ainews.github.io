- title: Snowflake推資料互通架構，鎖定AI應用資料孤島與語意不一致問題
  description: 在4月召開的Iceberg Summit期間，資料雲服務業者Snowflake說明其資料平臺發展方向。該公司指出，隨著企業加速導入AI應用，資料孤島、治理分散與語意不一致，正逐漸成為影響AI運作的關鍵因素。當企業無法在原地處理資料時，往往需透過資料搬移以完成分析，不僅提高成本，也使語意脈絡難以維持，使相關專案在導入初期就難以順利推展。
  url: https://www.ithome.com.tw/news/175054
