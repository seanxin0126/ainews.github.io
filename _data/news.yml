- title: IREN豪掷16亿美元采购戴尔AI服务器，剑指44亿美元年收入目标
  description: 数据中心运营商IREN宣布与戴尔科技签署价值约16亿美元的硬件采购协议，将大规模采购英伟达Blackwell系统以加速AI算力基础设施布局。根据协议，IREN将购买英伟达风冷式Blackwell系统，包括GPU、服务器、存储、网络设备、辅助设备、集成服务和保修。这些系统将部署在IREN位于得克萨斯州奇尔德里斯园区的现有数据中心，预计将于2027年初投入使用。（新浪财经）
