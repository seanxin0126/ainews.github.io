- title: 小米集团：第一季度新车交付量达到80856辆，同比增长6.6%
  description: 36氪获悉，小米集团发布2026年第一季度财报。财报显示，一季度智能电动汽车及AI等创新业务分部收入为199亿元，同比增长6.9%。其中，智能电动汽车收入为190亿元，其他相关业务收入为9亿元。本季度，受到车辆购置税补贴以及核心零部件价格上涨影响，智能电动汽车及AI等创新业务分部毛利率为20.1%。第一季度智能电动汽车及AI等创新业务分部经营亏损为31亿元。第一季度共交付80856辆新车，同比增长6.6%。
  url: https://36kr.com/newsflashes/3825926574314120
  source: 36kr.com
