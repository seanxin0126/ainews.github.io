- title: 中国央行：积极稳妥、安全有序推进金融领域人工智能应用，释放数字化、智能化发展动能
  description: 36氪获悉，中国人民银行召开2026年科技工作会议。会议要求，2026年科技工作要紧扣防风险、强监管、促高质量发展的主线，坚持党建引领，巩固拓展中央巡视、审计整改成果，持之以恒推进全面从严治党。突出规划先行，统筹“远中近”目标，谋深谋实“十五五”时期科技工作。强化系统观念，稳步推进重点项目落地实施。树牢底线思维，持续健全制度体系，进一步提高网络安全、数据安全韧性。深化业技融合，积极稳妥、安全有序推进金融领域人工智能应用，释放数字化、智能化发展动能。
