- title: 苹果推迟智能家居显示设备发布,以待AI助理就绪
  description: 知情人士称，苹果在人工智能领域进展不顺正波及其产品规划，迫使公司将一款筹备已久的智能家居显示设备推迟至今年晚些时候发布。这款代号为J490的产品最初计划于2025年春季推出，但为了让公司完成新版Siri数字助理的研发工作而被推迟，因为Siri是该设备界面的核心组成部分。（新浪财经）
