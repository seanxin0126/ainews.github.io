- title: Meta收购AI智能体社交平台Moltbook
  description: Facebook 母公司元平台（Meta）周二宣布，已收购Moltbook，这是一个专为人工智能智能体（AI agent）打造的社交平台，该平台创始人将加入
    Meta 的人工智能研究部门。本次交易后，Moltbook 联合创始人马特・施利希特（Matt Schlicht）与本・帕尔（Ben Parr）将加入Meta
    超智能实验室（Meta Superintelligence Labs），该部门由前 Scale AI 首席执行官王立瑞（Alexandr Wang）领导。（新浪财经）
