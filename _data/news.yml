- title: 年内FOF业绩分化明显，多元资产配置重要性持续提升
  description: 近期基金业绩波动加大，作为专业基金买手的FOF（基金中的基金）产品业绩表现受到市场关注。Wind数据显示，截至7月10日，全市场FOF产品今年以来平均收益率为4.22%，中位数为2.76%，产品整体取得正收益，但不同产品之间的业绩分化也进一步加大，科技成长行情成为推动部分产品业绩领先的重要因素。近日，多位FOF基金经理表示，AI产业趋势仍在延续，科技成长仍是市场主线，但随着市场进入业绩验证阶段，更应坚持多资产、多策略配置，在控制回撤的同时把握结构性投资机会。（证券时报）
  url: https://36kr.com/newsflashes/3893330623576578
  source: 36kr.com
- title: 年内激增超过2000亿元，科技类ETF规模突破5400亿元
  description: 今年以来，A股行业与主题类ETF持续扩容，科技赛道成为资金布局的核心主线。据统计：截至6月末，聚焦科技的行业和主题ETF规模超过5400亿元，较2025年末大幅提升2087亿元；此外，聚焦科技赛道的主动权益类基金规模占比也显著攀升。尽管半导体等前期热门科技板块近期出现显著波动，但多家公募机构研判，短期情绪扰动不改产业中长期上行趋势，AI商业化落地、半导体自主创新等核心逻辑持续夯实，科技赛道后续仍具备充足的投资空间。（上证报）
