  description: 据媒体报道，针对斯柯达品牌推出中国市场传闻，大众中国方面回应称：斯柯达汽车在中国的销售将持续到2026年年中，此后仍将为车主持续提供得全面的保修和售后服务支持。大众中国方面表示，斯柯达汽车对全球战略进行了调整，将重点聚焦印度、东盟等高增长市场。同时，大众中国再次强调，中国始终是大众汽车集团全球战略的核心。集团在华建有近40座工厂，服务超5000万名客户，同时设立了德国总部外规模最大的研发中心——大众汽车（中国）科技有限公司（VCTC），以持续推进智能网联汽车技术的开发。（财联社）
