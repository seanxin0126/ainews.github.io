- title: 德明利：预计年内存储行业供应仍将保持偏紧状态
  description: 36氪获悉，德明利在机构调研时表示，本轮存储行业景气周期与过往历史周期存在显著差异，是AI驱动需求爆发、行业供给资源向高附加值领域集中等多重因素共振下的行业发展新阶段，AI推理应用落地加速为存储行业带来长期、广阔的市场空间。市场机构TrendForce集邦咨询预估2026年第二季度一般型DRAM合约价格季增58%—63%，NAND
    Flash合约价格季增70%—75%，主流机构对行业景气度的延续持乐观预期，公司预计年内供应仍将保持偏紧状态。
