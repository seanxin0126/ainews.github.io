- title: Agent 架构设计与能力构建 - 哥不是小萝莉
  description: 1.概述 很多人第一次听到“Agent”这个词时，最容易把它理解成“更聪明的聊天机器人”。这个理解只对了一半。Agent 确实建立在大模型之上，但它的重点不是“会说”，而是“会做”。它不是只回答你一句话，而是能围绕一个目标持续推进：拆解任务、调用工具、观察结果、修正计划、保存状态，最后把事情做完。
