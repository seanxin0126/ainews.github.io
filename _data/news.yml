- title: 阿里财报电话会：未来五年，云和AI商业化收入突破1000亿美元
  description: 36氪获悉，在阿里巴巴集团2026财年Q3财报分析师电话会上，CEO吴泳铭表示，阿里已形成从AI Infra到应用的完整全栈AI能力，并加速推进MaaS平台建设。过去三个月，百炼MaaS平台上公共模型服务市场的Token消耗规模提升6倍，预计商业化MaaS收入将会成为阿里云最大的收入产品。同时，阿里云2026财年截至2月底的外部商业化收入正式突破1000亿元。商业目标是未来五年云和AI商业化收入突破1000亿美元。此外，平头哥自研的GPU芯片已实现规模化量产，截至26年2月，已经累计规模化交付47万片。
