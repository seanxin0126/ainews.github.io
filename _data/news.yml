- title: 推特前CEO创办AI初创公司完成融资，估值达20亿美元
  description: 由推特前首席执行官帕拉格・阿格拉瓦尔创立的初创公司ParallelWebSystems，完成1亿美元B轮融资，凸显市场对自主智能体落地应用的关注度持续攀升。本轮融资由红杉资本领投，这家坐落于加州帕洛阿托的企业估值由此攀升至20亿美元。凯鹏华盈、指数创投、科斯拉风投等现有投资方均跟投。（新浪财经）
  url: https://36kr.com/newsflashes/3788514523864066
