  description: Meta 平台已招揽人工智能智能体初创公司Dreamer的创始团队及全体员工。辛格尔顿在X平台发文宣布，Dreamer联合创始人雨果・巴拉、大卫・辛格尔顿与尼古拉斯・吉特科夫将加入
