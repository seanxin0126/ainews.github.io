- title: 再投12400亿 ! 谷歌，冲击全球AI“王座”
  description: "Alphabet CEO桑达尔·皮查伊\n 如果采用之前对互联网的估值方式对AI大模型公司进行估值，那么很有可能会错失一个时代。\n\
    \ 但这并不意味着，所有的大模型公司都能获配超溢价估值。\n 过去很长一段时间，对于创业型科技企业我们习惯找一家头部公司进行对标，然后贴上相应的标签。例如在芯片领域，一些创业型芯片企业很容易被对标英伟达，然后给予超出公司实际营收水平且梦幻般的估值。\n\
    \ 实际上，从公司本身的质地而言，差距十分明显。而英伟达作为芯片全球龙头，不管从需求的角度还是市场的角度，其产品很容易出售，业绩也很容易兑现，市场…"
