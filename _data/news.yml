- title: 布局下一代人机交互与具身数据入口，「念象科技」完成近千万元天使轮融资｜36氪首发
  description: "文｜胡香赟\n 编辑｜海若镜\n 36氪获悉，专注非侵入式神经接口技术研发与产业化的「念象科技」已完成近千万元天使轮融资。本轮融资由永珺星芒领投，浦东创投、一村资本跟投，募集资金主要用于产品研发、团队扩建、本土sEMG数据集建设。\n\
