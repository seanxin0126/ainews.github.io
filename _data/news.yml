- title: 两大热门ETF规模分化加剧，行业探寻两大破局方向
  description: 近日，此前发行一度火爆的自由现金流、中证A500两大指数基金接连亮起清盘预警红灯，背后是赛道同质化竞争加剧、市场资金风向切换带来的剧烈规模分化。研究院统计最新数据发现，两类热门指数基金中场外产品超七成在成立后遭遇规模缩水，大量尾部产品持续失血沦为迷你基金，而头部标的规模却逆势大幅扩张。公募业内人士分析，年内资金持续涌向AI科技主题基金，非科技类产品普遍遭遇规模缩水；赛道竞争白热化之下，同类产品的规模分化也成为常态。与此同时，各家机构也在实践中持续挖掘差异化路径，指数基金的生态搭建与策略创新，已然成为行业公认的两大…
