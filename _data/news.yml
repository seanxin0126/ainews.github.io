  description: "据美国政府一位高级官员透露，五角大楼正在考虑终止与人工智能公司 Anthropic 的合作关系，原因是该公司坚持对军方如何使用其模型设定一些限制。五角大楼正敦促四家领先的人工智能实验室允许军方将其工具用于“所有合法用途”，甚至包括武器研发、情报收集和战场作战等最敏感的领域。\r\
