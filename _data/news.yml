- title: 智能庭院机器人Yarbo获近2亿元融资，新品众筹首发6小时破150万美金｜硬氪首发
  description: "作者｜黄楠\n 编辑｜袁斯来\n 硬氪获悉，智能庭院机器人品牌汉阳科技Yarbo已完成近2亿元新一轮融资。本轮融资由松禾资本、温润投资（温氏股份旗下）、安乃达、芯联资本、龙华资本投资，涵盖了头部财务投资机构、上市公司产业资本与地方政府引导基金。融资资金将主要用于深化技术研发、加速产品迭代及拓展全球市场渠道。庚辛资本担任长期财务顾问。\n\
    \ 产业资本的注入将为Yarbo提供协同资源。其中，温润投资背靠温氏股份，有望在供应链优化、生产制造及潜在渠道拓展上提供支持。安乃达作为电机驱动领域的上市公司，将增强Yarbo在核心动力部…"
