  description: '三星電子驚傳內鬨，三星DX部門員工因不滿百倍的績效獎金落差，發起集體黑衣抗議。這紙績效獎金協議引發三星DX部門大規模退會潮，更揭示了科技巨擘在AI浪潮下面臨的公平分配難題。最近三星這場風波的起點，是2026年5月三星電子與工會達成的一份薪酬協議。

    協議核心是為半導體（DS）部門設立「特別管理績效獎金」——當三星年度營業利益超過200兆韓元（適用於2026至2028年），或超過100兆韓元（適用於2029至2035年），半導體部門員工便可額外分享相當於公司年度營業利益10.5%的特別獎金。

