- title: Claude Code 源码泄漏
  description: Anthropic 公司开发的 AI 编程工具 Claude Code 在发布到 npm 上时不小心通过一个映射文件泄漏了未混淆的源代码，源代码被提取出来之后被上传到了
    GitHub 等平台。用户发现， Claude Code 使用了正则表达式检测用户提示词中的负面情绪。使用正则表达式去检测情绪比调用大模型要快得多也能显著节省算力。
