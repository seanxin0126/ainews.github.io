- title: 上汽金石等入股首形科技
  description: '36氪获悉，天眼查App显示，近日，首形科技（上海）有限公司发生工商变更，新增无锡上汽金石创新产业基金合伙企业（有限合伙）、金石深合（贵州）数字科技股权投资合伙企业（有限合伙）等为股东，同时，注册资本由约451.5万人民币增至约522.6万人民币。

