- title: AI基建租赁拖累，SpaceX债务大增近三分之二至230亿
  description: 据一份机密IPO招股书显示，SpaceX去年债务规模增加近三分之二，从2024年底的140亿美元升至2025年底的约230亿美元。这一激增主要反映出收购xAI给公司带来了大量新增财务负债。文件显示，其中大部分债务与Valor
    Equity Partners的一份租赁协议有关，该协议用于为xAI租赁芯片等AI基础设施设备，SpaceX在资产负债表中将其记为45亿美元债务。招股书同时注明，Valor的首席执行官兼首席投资官安东尼奥・格拉西亚斯也是SpaceX的董事。（新浪财经）
  url: https://36kr.com/newsflashes/3778609977038088
  source: 36kr.com
- title: 七一二：控股子公司拟向北交所公开发行股票并上市
  description: 36氪获悉，七一二公告，公司控股子公司天津七一二移动通信股份有限公司(简称“津移通信”)拟向不特定合格投资者公开发行股票并在北京证券交易所上市。津移通信拟发行股票不超过50,666,667股（不含超额配售选择权），募集资金总额扣除发行费用后拟投入专用通信设备研发及总部基地建设、轨道交通专用通信设备产线建设等项目，合计拟使用募集资金4亿元。本次发行上市后，七一二仍为津移通信控股股东，津移通信纳入公司合并报表范围。该事项已经公司董事会审议通过，尚需提交公司年度股东会审议。
