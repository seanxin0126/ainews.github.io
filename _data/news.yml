- title: 欧盟向谷歌发布AI竞争合规指南，强制开放安卓系统访问权限
  description: 盟委员会周一正式向谷歌发布了一系列拟议措施，详细说明这家科技巨头应如何为AI竞争对手提供其安卓移动操作系统的核心功能访问权限，以遵守欧盟《数字市场法案》。监管机构指出，谷歌目前将其安卓系统中的关键能力（如语音唤醒、后台运行以及与系统应用的深度交互）保留给自家的Gemini
    AI服务。根据最新提案，谷歌必须向第三方AI助手提供与其自有Gemini服务“同等有效”的访问权限。（新浪财经）
  url: https://36kr.com/newsflashes/3785673311902725
  source: 36kr.com
