- title: 港交所刘颖：2018年推出18A章以来，已有90家生物科技公司在港上市
  description: 6月11日，港交所董事总经理、首次公开招股审查联席主管刘颖透露，自2018年推出18A章以来，已有90家生物科技公司成功在港上市，累计募资达1429亿港元。其中，2025年有17家18A公司上市，2026年前五个月再添6家。与此同时，在为特专科技公司设立的18C章上市机制方面，2024年及2025年分别有3家和5家企业通过该机制上市，2026年前五个月已有10家公司通过18C机制实现上市。目前，以18C章上市的行业主要包括AI、机器人，以及自动驾驶公司等。（界面）
