- title: 量化投资先驱马丁·卢克警告勿将交易决策全盘交予人工智能
  description: 量化投资领域最负盛名的人物之一警告称，不应将投资决策权完全交予人工智能，并指出对冲基金行业的某些领域在采用该技术方面已走得过远。马丁·卢克是量化先驱AHL的三位创始人之一，同时也是对冲基金宽立资本的联合创始人兼总裁。他表示，能够准确理解其计算机模型为何推荐特定交易，对他的公司而言至关重要。“我的出发点是，我不会将我的名字或我公司的声誉押在某个我完全不清楚它为何持有这些头寸的东西上，”卢克表示。他管理的公司资产规模达90亿美元。（新浪财经）
