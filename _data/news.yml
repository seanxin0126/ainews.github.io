- title: 武汉光谷建设投资公司增资至50亿，增幅约114%
  description: 36氪获悉，天眼查App显示，近日，武汉光谷建设投资有限公司发生工商变更，注册资本由约23.3亿人民币增至50亿人民币，增幅约114%。该公司成立于2002年10月，法定代表人为陈柔焰，经营范围含对基础设施项目、高新技术项目的投资及咨询，项目管理，房地产开发及经营，物业管理等。股东信息显示，该公司由湖北省科技投资集团有限公司、农发新型政策性金融工具有限公司、国开发展基金有限公司共同持股。
