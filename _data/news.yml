- title: OpenAI强硬回击增长质疑：一切业务“运转如飞”
  description: 当地时间周二（4月28日），OpenAI对外界关于其销售增长的质疑作出了回应，先前有报道称这家AI初创公司未能达到内部目标。OpenAI在声明中表示，无论是面向消费者还是面向企业的业务，都在“高速运转”（firing
    on all cylinders，指“发动机的所有气缸都在点火”）。OpenAI称，来自企业客户的需求持续增长，公司尚处早期阶段的广告业务也在扩张，“公司内部的氛围非常积极。”公司还称，“未能实现多项内部目标”的报道是“典型的标题党”。（财联社）
