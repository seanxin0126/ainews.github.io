- title: 中天科技：若未来光纤光缆行业市场需求不及预期、核心原材料供应紧张或价格大幅波动，可能对公司产生影响
  description: 36氪获悉，中天科技公告，公司注意到近期市场及媒体对光纤光缆行业需求、价格等相关事项关注度较高。全球人工智能技术的发展，带动了相关光纤光缆产品需求提升，但是行业整体发展与全球通信技术迭代、下游客户资本开支计划等因素紧密相关。若未来出现行业政策调整、市场需求不及预期、核心原材料供应紧张或价格大幅波动等情形，可能对公司生产经营、产品成本及盈利能力产生影响。敬请广大投资者理性投资，注意投资风险。
  url: https://36kr.com/newsflashes/3777805255562505
  source: 36kr.com
- title: 追觅硅谷发布会定档，4月27日-30日登陆北美
  description: 今日，追觅科技宣布，将于2026年4月27日至30日（北美时间）在硅谷举办以 “DREAME NEXT” 为主题的全球发布会周。活动为期四天，覆盖智能汽车、智能家电、智能手机及硬件、个护等业务矩阵，集中呈现追觅科技在AI驱动、具身智能、仿生交互等下一代技术方向的最新突破，展现完整的“人车家”智能生态。据了解，这是硅谷历史上首次迎来中国科技企业的专属发布会周。
  url: https://36kr.com/newsflashes/3777443596849664
  source: 36kr.com
- title: Meta拟追踪美员工点击及击键数据训练AI，官方称数据不用于绩效评估
  description: 4月22日消息，内部备忘录显示，Meta计划在美国员工的电脑上安装新的追踪软件，以捕捉鼠标移动、点击和击键操作，用于训练其人工智能模型，该工具将在一系列与工作相关的应用程序和网站上运行。备忘录指出，该工具还会不时截取员工屏幕内容的快照，以提供上下文，这一举措的目的是帮助公司在仍存在不足的领域改进模型，例如从下拉菜单中进行选择和使用键盘快捷键。Meta发言人表示，收集的数据不会用于绩效评估或除模型训练之外的任何其他用途，并且已采取安全措施保护敏感内容。（界面）
  url: https://36kr.com/newsflashes/3777653966411010
  source: 36kr.com
- title: 沪电股份：一季度净利润同比增长62.90%
  description: 36氪获悉，沪电股份发布2026年一季度业绩报告。报告显示，一季度实现营业收入62.14亿元，同比增长53.91%；归属于上市公司股东的净利润为12.42亿元，同比增长62.90%。业绩变动主要系受益于高速运算服务器、人工智能等新兴计算场景对印制电路板的结构性需求，依托平衡的产品布局以及深耕多年的中高阶产品与量产技术，报告期公司营业收入和净利润较上年同期大幅增长；此外受汇率波动的影响，报告期产生汇兑损失约1.48亿元。
