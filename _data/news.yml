- title: 中国电气装备集团成立华中公司，含AI及机器人业务
  description: 36氪获悉，爱企查App显示，近日，中国电气装备集团华中有限公司成立，法定代表人为李俊涛，注册资本1亿元人民币，经营范围包括人工智能应用软件开发、人工智能行业应用系统集成服务、人工智能硬件销售、智能机器人的研发等。股东信息显示，该公司由中国电气装备集团有限公司全资持股。
