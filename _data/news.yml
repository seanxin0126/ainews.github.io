- title: 营收三年增16倍，壁仞科技迎来业绩兑现期
  description: "3月30日港股盘后，壁仞科技发布上市后的首份财务报告。\n 数据显示，2025年，公司实现营业收入10.35亿元，同比增长207.2%；同期毛利达5.57亿元，同比增长210.8%，对应毛利率为53.8%。\n\
