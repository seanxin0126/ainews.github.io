- title: 三星电子将从下月开始允许员工使用外部AI模型
  description: 三星电子周二发布的一份内部备忘录显示，该公司将从下个月开始允许员工使用其他公司开发的生成式人工智能（AI）模型，例如ChatGPT。备忘录称，三星计划于6月正式推出一项外部生成式AI服务，目标用户是其设备体验（DX）部门的员工，该部门涵盖公司的显示器、移动设备和家电业务。据业内人士透露，三星还计划在下半年开设人工智能应用方面的培训课程，预计将有来自三星电子及其主要附属公司的约
    2000 名高管参加。（新浪财经）
