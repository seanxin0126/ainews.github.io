- title: 工程机械“切入”AI赛道，主题ETF获逾40亿资金涌入
  description: 由AI数据中心扩张驱动的电力缺口，正推动燃气轮机、储能、微电网等电力装备及其配套制造链需求爆发，其中切入该赛道的工程机械板块亦成为市场焦点。2026年以来，该主题相关的ETF已吸引超40亿元资金净流入。在多位基金经理看来，AI数据中心是典型的重资产工程。其上游落地最终需要工程施工和设备配套来完成。未来3—5年，电力叙事对工程机械板块的最大意义，不是改变行业周期属性，而是重塑周期的结构、持续时间和估值上限。（证券时报）
  url: https://36kr.com/newsflashes/3724835324754561
  source: 36kr.com
