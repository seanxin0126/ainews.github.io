- title: 年内港股IPO募资同比增长超10倍
  description: 今年以来，港股IPO市场延续火热态势。东方财富Choice数据显示，截至2月26日，年内已有24家企业完成港股IPO，同比增长166.67%，融资额合计892.26亿港元，同比增长1013.59%。市场结构变化成为本轮IPO热潮的显著特征。人工智能、半导体、生物医药等新兴领域企业异军突起，成为港股IPO市场的绝对吸金主角。在众多新兴领域中，AI赛道无疑是驱动本轮IPO热潮的关键引擎。2026年开年，壁仞科技、MINIMAX-WP（稀宇科技）等企业相继登陆港股，受到市场追捧。（证券日报）
