  description: '脉脉发布 2026 春招报告：具身智能岗位量暴增 15 倍，平均月薪 6.2 万

    5 月 13 日，脉脉发布了《2026 春招职场洞察报告》。报告显示，今年前四个月 AI 岗位新发量同比激增 8.7 倍，其中北京以 30.17% 的 AI
    岗位渗透率位居全国首位。值得注意的是，AI 已深度介入组织管理，近四成程序员的绩效考核已正式纳入 AI 能力相关指标。


