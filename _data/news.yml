- title: 安森美半导体70亿美元收购Synaptics
  description: 安森美半导体公司周四宣布，已同意以全股票交易方式收购Synaptics，交易价值约70亿美元。这是该公司迄今为止规模最大的收购，希望借此扩大其在人工智能设备和所谓“物理AI”领域的市场份额。根据协议条款，Synaptics股东每持有1股Synaptics股票，将获得1.350股安森美普通股。该换股比例较两家公司股票过去10个交易日的成交量加权平均收盘价溢价19%。（新浪财经）
