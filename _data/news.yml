  source: 36kr.com
- title: 老铺黄金还不是爱马仕
  description: "作者 | 谢芸子\n 编辑 |  张帆\n 老铺黄金在同一天披露了两组让同行“艳羡”的财报数据。\n 2025年全年，老铺黄金销售业绩达到313.75亿元，同比增长220.3%；营收273.03亿元，同比增长221%。按非国际财务报告标准，公司经调整净利润为50.29亿元，同比增长234.9%。\n\
