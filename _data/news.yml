- title: 扎克伯格为Meta付费人工智能工具制定“激进”价格策略
  description: Meta Platforms Inc．发布了其最先进人工智能模型Muse Spark 1.1，并首次面向开发者推出付费版本。这是Meta首次向企业收取模型使用费，也为公司开辟了新的收入来源。扎克伯格在发布前接受采访时表示，这款模型将成为市场上价格最低的选择之一。“由于这不是开源模型，我认为这是我们第一次真正认真推出API，”扎克伯格说，“其定价将极具竞争力，也非常有吸引力。”（新浪财经）
