  description: 英伟达正计划推出一款名为NemoClaw的开源AI智能体平台，以顺应这类人工智能工具日益高涨的流行趋势。报道援引知情匿名消息人士称，英伟达已开始向企业软件公司推介该产品，寻求与Salesforce、思科、谷歌、奥多比、CrowdStrike建立合作关系。（新浪财经）
