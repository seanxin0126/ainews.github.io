  description: 还有两个交易日，今年公募基金“中考”即将收官。目前来看，上半年基金的业绩有望创出历史最佳纪录。今年以来，A股走出极致结构性行情，AI算力等高景气赛道持续走出独立行情，主动权益基金收益格局显著分化，呈现出“近科技则强、远科技则弱”的特征。重仓科技赛道的基金净值大幅飙升，翻倍基金数量超过百只、最高收益率约175%均有望创出基金“中考”最高纪录。值得注意的是，参考历史案例，基金上半年若有超高收益，下半年想要延续上半年的优秀业绩，将面临波动压力，且收益增厚空间有限。（证券时报）
