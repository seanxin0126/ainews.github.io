- title: 黄仁勋：还需要投资数万亿美元建设AI基础设施
  description: 美东时间周二（10日），英伟达首席执行官黄仁勋罕见以个人名义发表长篇博文“AI is a five layer cake”，并写道：“我们才刚刚开始这项建设。我们已经投入了数千亿美元。还有数万亿美元的基础设施需要建设。”黄仁勋写道：“人工智能是当今塑造世界的最强大力量之一。它并非一款智能应用或单一模型；它如同电力和互联网一样，是不可或缺的基础设施。”“全球范围内，我们正见证着芯片工厂、计算机组装厂和人工智能工厂以前所未有的规模拔地而起。这正成为人类历史上规模最大的基础设施建设浪潮。”他补充道。（新浪财经）
  url: https://36kr.com/newsflashes/3718004877276552
  source: 36kr.com
- title: 液冷产业链多家上市公司迎来公募基金密集调研
  description: 2026年一季度进入尾声，公募基金对上市公司的调研轨迹显示，基金经理仍在挖掘半导体、新能源、人工智能等前沿赛道投资机会，具备核心技术与产业化能力的企业备受青睐。其中，作为AI算力关键基础设施的液冷技术，正从技术验证迈向规模商用，这一产业拐点吸引了资金高度关注，产业链内多家上市公司迎来公募基金的密集调研。（证券时报）
