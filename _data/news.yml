- title: 贝莱德、殷拓集团牵头的财团将以107亿美元收购AES公司
  description: 由贝莱德旗下全球基础设施合伙公司及投资集团殷拓（EQT）牵头的投资者财团，已同意以107亿美元收购AES公司。AI数据中心的大规模建设，正推动电力需求急剧增长。随着AI巨大的能源需求给电网带来沉重负担，AES这类公用事业与发电企业正受到越来越多的关注。贝莱德全球基础设施合伙公司首席执行官巴约・奥贡莱西表示：“发电、输电和配电领域的新增产能需要大量投资。”AES表示，此次出售将为其提供此前缺乏的、用于扩大美国能源发电业务所需的资金。（新浪财经）
