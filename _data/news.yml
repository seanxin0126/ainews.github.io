- title: Meta智慧眼鏡遭紐約法院全面封殺，全美首例「法庭穿戴禁令」本月上路
  description: '紐約州正式對智慧眼鏡下達禁令，自2026年起禁止該類裝置進入法院。紐約州此舉旨在防範非法錄影，確保智慧眼鏡不會威脅司法安全，透過鐵腕手段在法院內築起最高規格的隱私防線。隨著
    Meta 等科技巨頭大舉推廣搭載隱形攝影鏡頭的「智慧眼鏡」，公共敏感場所的隱私防護也面臨全新的法律考驗。美國紐約州法院管理局近日發布正式公告，宣佈自 2026
    年 7 月 20 日起，全面禁止所有配備鏡頭、麥克風或其他錄影錄音功能的頭戴式穿戴裝置及智慧眼鏡進入法院大樓。這使紐約州成為全美首個在法庭內實施智慧眼鏡禁令的州。

    處方眼鏡亦在禁用之列…'
  url: https://www.techbang.com/posts/131145-new-york-first-state-to-ban-smart-glasses-in-courtrooms
