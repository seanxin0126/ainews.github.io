  description: 'OpenAI揭露中國關聯帳號利用AI影響輿論，企圖操弄美國資料中心建設。報告指出中國操作者試圖透過誤導性敘事干預政策，儘管資料中心擴建確有爭議，OpenAI仍警告此類干預輿論的行動，已...OpenAI近日發布了一份威脅報告，指出有部分與中國相關聯的用戶帳號，曾試圖利用ChatGPT生成特定內容，藉此影響美國民眾對本土資料中心建設及相關科技政策的看法。

    報告強調，這些已被封禁的帳號暗中參與了所謂的「影響力行動」，試圖透過製造與散布特定敘事，來操縱圍繞著美國AI發展與廣泛科技政策的公共辯論，不過這些行動最終幾乎未能…'
