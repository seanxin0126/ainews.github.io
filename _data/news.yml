- title: 优刻得：搭载OpenClaw镜像的轻量云主机产品尚未形成规模化的产品体系
  description: 36氪获悉，优刻得发布异动公告，公司股票于2026年3月6日、3月9日和3月10日连续3个交易日内收盘价格涨幅偏离值累计超过30%，属于股票交易异常波动情形。公司搭载OpenClaw镜像的轻量云主机产品尚未形成规模化的产品体系，技术迭代及商业化进展可能不及预期。目前相关业务尚未形成稳定、可持续的收入来源，收入占比极低，未来产品的收入规模、盈利水平及现金流贡献存在高度不确定性，短期内对公司整体经营业绩影响有限。OpenClaw等自主AI智能体框架目前处于早期发展阶段，其未来市场空间、技术稳定性、数据安全性等方面存在…
