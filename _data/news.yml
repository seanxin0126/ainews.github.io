- title: Mistral筹集8.3亿美元在欧洲建设英伟达芯片驱动的AI中心
  description: 3月30日，法国人工智能初创公司Mistral AI宣布，已获得8.3亿美元的债务融资，用于在巴黎郊外建设数据中心项目。Mistral表示，这笔资金将用于从英伟达公司购买13,800个GB300芯片，用于在法国建设数据中心，该数据中心将于2026年第二季度投入运营。Mistral计划到2027年底，在欧洲各地提供200兆瓦的数据中心容量。（界面）
