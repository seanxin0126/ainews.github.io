- title: “小雨智造”完成数亿元B轮融资
  description: 36氪获悉，3月3日，通用具身智能科技公司“小雨智造”宣布完成数亿元B轮融资。本轮融资由华业天成领投，招银国际、茅台基金、贵州省科创天使基金共同跟投，老股东滴滴和小米联合创始人黎万强追加投资。小雨智造创始人乔忠良表示，本轮融资将用于加大具身大模型投入，持续布局工业场景，与供应链企业展开战略合作加速量产。
