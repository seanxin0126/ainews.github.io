- title: 德祥地产：与荣联科技围绕AI算力基础设施达成战略合作
  description: 36氪获悉，德祥地产在港交所公告，公司正积极推动将既有传统资产能力与AI算力基础设施建设进行战略协同之整体布局，并持续优化资产组合，董事会认为，公司在以上方面已取得重大实质性突破。于5月19日，公司已分别签署首份人工智能算力技术服务合同并与荣联科技订立了战略合作框架协议。依据战略协议，公司与荣联科技一致同意围绕AI算力基础设施全生命周期展开深度产业协同，采取“短期轻资产前置部署、中期资产架接组合、长期重资产共建”的三步走战略。
