- title: 光帆科技董红光：把AI耳机做成“第二台主机”，很难，却正确
  description: "文｜邱晓芬\n 编辑｜苏建勋\n 2026年，AI硬件热到发烫。\n OpenAI、Meta、苹果、阿里千问、字节等大厂都加入了入口争夺战，通过自研或重金外部收购团队，补上他们在AI上最后一块短板。而AI可穿戴设备，毫无疑问成为所有大厂们“补入口”的集体选择。\n\
