- title: 应用材料将与美光及SK海力士合作开发AI存储芯片
  description: 美国应用材料公司周二表示，将于美光科技和SK海力士合作，开发对人工智能和高性能计算至关重要的下一代芯片。美光和SK海力士将作为应用材料研究中心的创始合作伙伴来开发这些芯片，该中心称为设备和工艺创新与商业化中心（EPIC）。（新浪财经）
