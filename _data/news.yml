- title: 机构2月调研近240家上市公司，人形机器人等投资机遇获重视
  description: 2月以来，各类机构调研上市公司动作频频。Wind数据显示，截至2月26日发稿时，2月以来已有近240家公司接待各类机构调研。2月以来，A股整体维持高位震荡态势，前述被机构调研公司中，过半数在同时期取得正收益，部分标的2月以来累计涨幅超过80%，表现远超市场主要股指。从行业分布情况看，机械设备、电子行业继续成为机构2月重点调研的方向，基础化工等周期风格板块同样获得机构高度关注。对于相关领域后市投资机遇，当前机构较为看好人形机器人、上游AI基建核心赛道、兼具高弹性和高股息优势的部分化工板块标的等。（中证网）
