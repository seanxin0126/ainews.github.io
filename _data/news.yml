- title: 存储芯片短缺持续，国内产业链深度受益
  description: 5月11日，全球存储芯片龙头SK海力士、三星电子股价创下历史新高。AI算力需求、大厂资本投入持续带动存储芯片需求。高盛研报显示，市场正面临15年来最严重的存储芯片供应短缺。机构预计存储芯片今年二季度价格将持续大幅上涨。中国供应链也受益于本轮涨价，今年一季度，A股存储器公司业绩普遍实现高增长，多家上市公司今年以来股价涨幅超100%。（中证网）
