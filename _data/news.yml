- title: 黃仁勳開砲馬斯克、 Amodei 等科技大佬的「AI末日論」：荒謬且傲慢的恐懼行銷
  description: '針對AI末日論，輝達黃仁勳公開反擊，直言這些警告荒謬傲慢。黃仁勳強調AI是工業革命的延伸，人類應專注AI安全與倫理治理，而非被末日論誤導。針對馬斯克（Elon
    Musk）與 Anthropic 執行長 Dario Amodei 等人頻頻發出的「AI 恐將毀滅人類」警告，輝達（NVIDIA）執行長黃仁勳在最新一期的科技論壇上公開反擊，直言這些「末日論」既荒謬又顯得有些傲慢。

    黃仁勳認為，將目前的技術進展過度解讀為具備神性的終結者威脅，不僅脫離了工程科學的現實，更可能掩蓋了目前真正需要被討論的隱私、安全與倫理治理問題…'
