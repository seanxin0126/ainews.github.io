- title: 特朗普刚下令禁用Anthropic 美军数小时后就在中东打击行动中使用该公司AI工具
  description: "就在美国总统特朗普宣布联邦政府将停止使用科技公司Anthropic的人工智能工具数小时后，美军便借助同一批工具，对伊朗发动了大规模空袭。知情人士证实，包括美国中东中央司令部在内的全球美军指挥机构，均在使用Anthropic旗下的Claude人工智能工具。中央司令部拒绝对此次针对伊朗行动中使用的具体系统置评。\r\
    \n这些人士称，尽管该公司与五角大楼关系日趋紧张，美军中央司令部仍使用这款工具进行情报评估、目标识别和作战场景模拟，凸显出这类AI工具已深度嵌入军事行动。特朗普政府与Anthropic已就其AI模型如何供五角大…"
  url: https://www.cnbeta.com.tw/articles/tech/1551682.htm
  source: Cnbeta.com.tw
