- title: 內部紅隊模型GPT-Red自動找漏洞，GPT-5.6 Sol提示注入攻擊成功率降至0.05%
  description: OpenAI運用內部安全紅隊模型GPT-Red，提升產品模型對提示注入的防禦能力。GPT-Red透過自我對戰強化學習，自動產生提示注入攻擊，找出產品模型與AI代理系統的弱點，再將這些攻擊納入後續模型訓練。OpenAI表示，GPT-5.6
