- title: 上海：引导社会力量建设3—5家新型研发机构，新增一批农业产业领域上市企业
  description: 36氪获悉，上海市人民政府印发《上海市推进乡村全面振兴“十五五”规划》。其中提出，坚持产业需求导向，引导高校科研院所面向涉农企业需求开展联合攻关，打通基础研究、应用开发、成果转化的创新链条。强化企业创新主体地位，支持涉农科技型企业联动高端装备、人工智能等领域企业，牵头开展以产业应用为导向的集成创新，打造和开放一批具有全国影响力的农业科技创新应用场景。引导社会力量建设3—5家新型研发机构，新增一批农业产业领域上市企业，培育一批生物育种、农业生物制造、现代设施农业等领域科技型企业。
