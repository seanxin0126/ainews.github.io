- title: 联想发出警告 3月或上调部分PC产品的价格
  description: "去年末，随着近期超大规模云端服务供应商加大人工智能（AI）方面的支出，存储产品的短缺情况变得越来越严重。无论DRAM还是NAND闪存，价格都因供应短缺快速上涨。联想作为全球最大的PC制造商，曾表示已囤积了足够的存储产品来应对未来一段时间的供应短缺，零部件库存水平比平常高出了50%，以适应供应链出现的急剧变化。\r\
    \n即便如此，联想在今年1月还是上调了产品的定价。据CRN报道，联想北美渠道负责人本月早些时候向合作伙伴发出警告，称随着DRAM成本上升，预计3月会上调部分PC产品的价格。联想表示，持续的AI数据中心建设导致…"
  url: https://www.cnbeta.com.tw/articles/tech/1550784.htm
  source: Cnbeta.com.tw
- title: 春晚机器人卖爆了，我们离“人手一台”还有多远？
  description: "1996年“春晚”，小品演员郭达往舞台上推了一只写着“ABCD”，印着“丰田”标志的货箱，箱子里藏着一个名叫“缺心眼子”的“进口机器人”。那时的“机器人”是国人对未来的一种诙谐想象。在大家眼里，“机器人”就应该像西方科幻电影中那样机械化，恰如当年蔡明饰演的机器人的样子。它不仅动作要像机器，思维逻辑也必须是直线的、二极管式的——要么开，要么关；要么听话，要么死机。\r\
    \n蔡明的表演也强化了这一特性。她的台词剥离了所有语调起伏，用一种理性的、冰冷的，近乎“电子合成音”的单调频率，来模拟机器的僵硬感和笨拙，以制造笑料。谁能…"
  url: https://www.cnbeta.com.tw/articles/tech/1550718.htm
  source: Cnbeta.com.tw
