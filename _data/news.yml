- title: 腾讯官宣全系“龙虾”产品，Qclaw支持微信远程操控
  description: 3月10日，腾讯官宣了全系“龙虾”矩阵，包括腾讯版"免部署小龙虾"WorkBuddy、内测中的QClaw、腾讯云Lighthouse等产品。其中，QClaw正在内测，该智能体可通过微信对话远程操控。腾讯介绍，基于OpenClaw打造的本地AI助手可在Windows或Mac上一键安装，覆盖5000个以上的skills。用户在微信上发个信息给QClaw，就可以让家里的电脑算报表、传文件。（第一财经）
