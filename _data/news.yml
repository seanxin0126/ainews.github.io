- title: 万物云：与万科关联应收账款余额仅剩20.6亿，业务独立性持续增强
  description: "3月19日晚间，万物云空间科技服务股份有限公司发布2025年度业绩报告。报告期内，万物云实现营业收入372.7亿元，同比增长2.7%，剔除开发商相关业务后，营收同比增长8.4%；核心净利润约21.3亿元，同比微增0.8%；归母净利润7.7亿元，同比出现较大幅度下滑。\n\
    \ \n 业绩发布会现场\n 万物云董事长朱保全在业绩发布会上表示，关联开发商（万科）产生的坏账及资产摊销所带来的负向影响是利润下滑的主要原因，2025年全年因此产生了7.4亿元的净利润负影响，这是一个“被动”的发生过程，但报告期内公司持续关联交易收入同比…"
