- title: 正泰集团与阿里云达成战略合作
  description: 6月8日，正泰集团与阿里云正式签署全面合作协议。双方将围绕AI大模型、云及算力中心基础设施与业务协同出海三大核心领域，构建双向赋能的深度合作格局，共同推动智慧能源与人工智能的融合发展。正泰将充分发挥供配电的全产业链优势，为阿里云国内外算力中心项目提供高效交付与服务保障。阿里云将为正泰提供稳定、安全、高效的云计算基础设施及千问大模型能力，支撑正泰的行业大模型与智能体构建，加速AI在电气产品研发、供应链优化、光伏电站运营运维等场景落地。
  url: https://36kr.com/newsflashes/3847016759429636
