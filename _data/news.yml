- title: 博通警告供应链受限，称台积电产能成为瓶颈
  description: 当地时间周二（3月24日），芯片设计公司博通表示，公司正面临供应链限制，包括芯片制造合作伙伴台积电的产能上限。这凸显了AI需求激增对整个科技行业产生的连锁反应。博通物理层产品部门产品营销总监周二对媒体表示：“我们看到台积电正面临（产能）瓶颈。他们会持续扩充产能直到2027年，但在2026年，这已经成为一个瓶颈，或者说在某种程度上卡住了整个供应链。”（财联社）
