- title: 业绩排名压力与长期价值投资难权衡，部分基金经理调仓策略面临“言行背离”困境
  description: 2026年一季度，A股市场在AI热潮与地缘政治扰动中博弈。随着公募基金一季报的密集披露，一场关于基金经理“言行一致性”的审视正在业内悄然展开。业内人士指出，当前绩优基金持仓呈现典型的“哑铃型”特征，一端是代表未来的AI科技，一端是重资产低淘汰性的HALO资产。然而，在微观层面的基金经理操作却频频出现“言行背离”的迹象，这种现象不仅让基民感到困惑，更折射出当前公募行业在业绩排名压力与长期价值投资之间的深层焦虑。（经济参考报）
  url: https://36kr.com/newsflashes/3784360559614982
