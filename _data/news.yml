- title: 高通将向印度人工智能战略基金投资至多1.5亿美元
  description: 根据一份声明，高通公司计划投资高达 1.5 亿美元，以支持印度不断扩大的科技和人工智能初创企业生态系统。资金将通过高通创投（Qualcomm
    Ventures）投向处于各个发展阶段的初创企业，重点在于汽车、物联网、机器人技术和移动领域的 AI 应用。
  url: https://36kr.com/newsflashes/3688343702908800
