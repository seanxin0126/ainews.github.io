- title: 罗博特科：全资子公司FSG作为英伟达合作方之一，新一代产品和技术尚未形成商业化落地
  description: 36氪获悉，罗博特科公告，公司全资子公司FSG作为合作方之一，与英伟达公司合作开发面向新一代共封装光学及光互连技术的制造与测试解决方案。新一代产品和技术处于与客户共同合作开发阶段，尚未形成商业化落地，与目前产品和技术不构成冲突。目前，相关技术虽已取得阶段性研发成果，但对应业务仍处于早期发展阶段，尚未形成商业化落地。产品后续市场推广、客户验证、规模化量产等进程尚存在不确定性，可能面临市场推广不及预期、客户验证未通过、订单未能如期交付等风险。
