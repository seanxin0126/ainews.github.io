- title: AI世纪对决开庭，马斯克在OpenAI审判中出庭作证
  description: 本周二，埃隆・马斯克出庭作证表示，他起诉 OpenAI 及其高管的诉讼，早已超越单一企业纠纷，直指人工智能这项足以毁灭全人类的技术未来。马斯克指控，OpenAI首席执行官山姆・奥尔特曼、总裁格雷格・布罗克曼联手欺骗自己，背弃了OpenAI最初的非营利使命。目前，马斯克向美国加州北区联邦地区法院提起诉讼，要求OpenAI赔偿1300亿美元损失，强制公司恢复非营利架构，并罢免奥尔特曼与布罗克曼的董事职务。（新浪财经）
