- title: 人工智能技术渗入美司法体系 引发办案效率与司法公正双重担忧
  description: "随着生成式人工智能（AI）技术在法律行业的快速渗透，美国联邦及地方各级法院正深陷技术创新与司法审慎的博弈中心。最新调查显示，大批美法官已在日常工作中引入AI工具，但与之伴随的技术“幻觉”、虚假判例以及隐私泄露等风险，正在对美司法体系的公信力带来严峻挑战。\r\
    \n美国西北大学日前发布的一项针对112名法官的调查数据显示，高达60%的受访法官表示至少使用过一种AI工具，超过22%的法官坦言在日常或每周审判业务中频繁使用AI。然而，技术应用的普及速度已远超相关专业培训的跟进速度。西弗吉尼亚大学法学院教授艾米·赛菲特（Amy…"
