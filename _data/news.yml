- title: 科技行业裁员浪潮加剧，多数美国劳动者支持设立人工智能财富基金
  description: 近期一项民意调查表明：美国科技行业裁员愈演愈烈，大部分在职人员希望借助人工智能主权财富基金，倒逼企业承担更多社会责任。维拉斯莱特公司6月对1690名美国成年人开展这项全国性调查，本月初对外公布结果：69%的美国人支持立法强制人工智能巨头把半数股份划入公共主权财富基金。该机构首席执行官本杰明・莱夫表示：“在普通民众看来，人工智能主权财富基金可以把人工智能行业产生的红利回馈给全社会大众。”（新浪财经）
