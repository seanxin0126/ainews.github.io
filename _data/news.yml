- title: 苹果拟借Siri应用程序、全新界面及“Ask”按钮重启AI战略
  description: 据报道，苹果公司正在测试一款独立的Siri语音助手应用程序，以及一项可在其各类软件中运行的“Ask Siri”新功能，这是其更广泛人工智能(AI)重大升级的一部分。知情人士透露，苹果同时在对Siri进行现代化改造，为其赋予全新界面和类似聊天机器人的体验。因相关计划非公开而不愿具名的这些人士表示，新版Siri计划于6月8日在苹果全球开发者大会（WWDC）上发布，作为iOS
