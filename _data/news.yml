- title: 估值500亿美元，月之暗面计划8月启动上市前最后一轮融资
  description: 中国AI大模型独角兽月之暗面（Moonshot AI）计划于8月启动上市前最后一轮融资谈判，目标估值高达500亿美元。据了解，月之暗面预计将在未来几天完成今年夏季启动的一轮融资，该轮融资估值约315亿美元。融资完成后，月之暗面将立即启动新一轮融资洽谈，这将成为月之暗面赴港上市前的最后一次资本注入，最快可能于今年内登陆香港资本市场。（澎湃）
