- title: Mythos引发网络攻防新焦虑，新加坡金管局要求银行补上安全漏洞
  description: 随着对Anthropic PBC最新人工智能（AI）模型Mythos的担忧蔓延至亚洲，新加坡金融监管机构正敦促银行堵上网络安全漏洞。新加坡金融管理局发言人在回应关于Mythos所带来风险的询问时表示，金管局正与该国网络安全机构协调，加强包括银行在内的关键基础设施运营方的防御能力。Mythos是Anthropic推出的一款新AI模型，该公司认为该模型“过于危险”，不宜广泛发布。（新浪财经）
  url: https://36kr.com/newsflashes/3774634078782215
  source: 36kr.com
- title: 昆仑万维：艾捷科芯引入外部投资者长鑫科技全资子公司、彩讯股份等，整体估值达约40.54亿元
  description: 36氪获悉，昆仑万维公告，公司同意控股子公司北京艾捷科芯科技有限公司对外增资扩股事项。本次艾捷科芯合计募资55000万元，其中，外部投资者合计出资45000万元，获得艾捷科芯增资后11.1006%的股权；艾捷科芯核心管理层出资10000万元，获得艾捷科芯增资后2.4668%的股权。经综合测算，本次增资完成后，艾捷科芯整体估值约为40.54亿元。此次引入长鑫芯聚、彩讯股份等投资方，旨在增强资本实力，助力AI芯片业务发展及未来独立上市，其中，长鑫芯聚是长鑫科技集团股份有限公司的全资子公司。
  url: https://36kr.com/newsflashes/3775036296528640
