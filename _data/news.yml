- title: SK电讯拟3971亿韩元收购SK海力士美国子公司股份
  description: 6月29日，韩国交易所的一份文件显示，SK电讯召开董事会，决定以现金出资方式收购SK海力士美国子公司（SK hynix NAND Product
    Solutions Corp.）新发行的642股股份，收购金额约为3971亿韩元（约合2.57亿美元）。交易完成后，SK电讯将持有该公司0.62%的股权。SK电讯表示，此举旨在与公司AI业务形成协同效应，推动NAND解决方案领域的战略布局。本次收购预定于2026年7月23日完成交割。（界面）
