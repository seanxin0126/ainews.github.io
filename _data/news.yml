- title: OpenAI将从MGX、Coatue和Thrive募集100亿美元资金
  description: 知情人士表示，OpenAI即将从投资者那里获得约100亿美元的新资金，从而将其估值提高到8500亿美元，其中包括筹集到的资金，这证实了彭博新闻社早些时候的报道。该人士称，投资者包括阿布扎比的MGX、Coatue和Thrive
    Capital。Altimeter Capital预计也将参与本轮融资。该笔交易有望在下周敲定。新增资金将使OpenAI最新一轮融资的总融资额达到约120亿美元。（新浪财经）
