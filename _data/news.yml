- title: Meta内部AI孵化器研发OpenRouter竞品，用以削减代码开发算力成本
  description: Meta旗下负责孵化AI产品与工具的内部实验室，正在开发一款对标OpenRouter的调度服务。该服务可将不同AI任务分流至性价比更高的大模型运行，以此降低整体算力开支。这家名为AAI
    Labs的孵化器隶属于Meta应用AI工程团队。Meta于今年3月正式组建该部门，员工可在此申报各类面向公司内部使用的AI产品与服务项目，成熟项目后续也有望对外正式发布。媒体查阅的内部文件显示，项目提案获批后，公司会组建小型专项团队完成产品开发，评估是否对外上线。（新浪财经）
