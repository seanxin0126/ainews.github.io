- title: 前谷歌DeepMind研究员创办AI初创公司，斩获11亿美元创纪录种子轮融资
  description: 谷歌人工智能部门DeepMind的前核心研究员于周一官宣，其成立仅数月的初创公司Ineffable Intelligence，完成高达11亿美元的种子轮融资。这家企业聚焦超级智能研发。公司表示，本轮融资为欧洲有史以来规模最大的种子轮融资，投后整体估值达510亿美元。本轮融资由美国风投机构红杉资本与光速创投联合领投，英伟达、DST全球资本、指数创投、谷歌、英国国家人工智能主权基金等多家机构跟投。（新浪财经）
