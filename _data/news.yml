- title: 阶跃星辰计划赴港IPO？公司暂无回应
  description: 2月26日，有报道称AI大模型公司阶跃星辰考虑在港交所IPO，计划筹集约5亿美元。报道援引知情人士消息称，阶跃星辰已就股权出售事宜与潜在顾问进行磋商，发行规模和上市时间尚未敲定，最早或在今年完成上市。
    另有知情人士对媒体表示，公司目标递表时间最快在上半年，不过进程上相对紧凑，下半年递表会是一个更从容的安排。截至北京商报记者发稿，阶跃星辰对此保持沉默。如消息属实，阶跃星辰大概率将成为第三家上市的大模型创业公司。阶跃星辰成立于2023年，是“大模型六小虎”之一。（北京商报）
