  description: 36氪获悉，中康科技正式推出“医生智能体+医生小龙虾”双端协同的中国首个医生超级助理MedMate。据了解，MedMate以“医生智能体+医生小龙虾”双端协同为核心，构建了一套覆盖临床、科研、患者管理的AI
