- title: 一季度我国智能消费设备制造增速明显
  description: 今年一季度，在消费品以旧换新政策加力扩围、AI技术与消费产品深度融合的双重拉动下，我国智能消费设备制造发展态势向好，生产增速亮眼，成为工业经济增长的重要支撑。数据显示，一季度，我国智能手机产量2.98亿台，同比增长6.9%，服务机器人产量超440万套，同比增长2.6%。整机销售也带动了上游电子元器件产量增长。集成电路作为核心配套元器件，产量1272亿块，同比增长24.3%，为智能消费产品生产提供坚实支撑。出口表现亮眼。（央视新闻）
