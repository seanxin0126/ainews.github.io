- title: 产业链迎业绩与估值双重驱动，存储芯片板块投资机遇凸显
  description: 在人工智能算力需求引发全球存储芯片涨价、国产化率逐步提升的背景下，存储芯片板块已迎来业绩增长与估值修复双重驱动的窗口期。Wind数据显示，A股存储芯片板块5月18日表现亮眼，万得存储器概念指数上涨3.98%。分析人士认为，存储芯片景气周期的持续性和强度与过往周期有所不同，国内存储产业链有望在更长周期内维持较高景气度。（中证网）
