  description: '泰國消委會重拳出擊，針對日益猖獗的網路詐騙向多間跨國科技巨頭提告並求償2.3億。訴訟直指跨國科技巨頭審核不力，導致平台淪為網路詐騙的溫床。網路詐騙在全球日益猖獗，泰國消費者委員會（TCC）近日祭出史無前例的法律行動，直接將矛頭對準了國際科技巨頭。

