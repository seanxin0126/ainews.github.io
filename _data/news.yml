- title: 华西证券：建议关注高景气成长赛道以及政策、科技加持下服务业景气拐点赛道
  description: 36氪获悉，华西证券研报表示，展望2026年，建议关注高景气成长赛道以及政策、科技加持下服务业景气拐点赛道，具体包括：1.服务消费迎来政策及行业新需求共振，有望驱动行业拐点，包括免税、银发旅游、育儿消费等。2.新消费拥有需求长逻辑，景气度有望维持，当前行业龙头估值处于相对低位，2026年仍然拥有足够弹性，包括潮玩、茶饮、时尚黄金珠宝、保健品等。3.零售业态创新+出海打开新成长空间。4.AI+应用2026年有望迎来百花齐放，从主题到商业化变现加速。
  url: https://36kr.com/newsflashes/3760277738226439
  source: 36kr.com
