  description: 日前，伴随2025年度报告密集披露，大中型商业银行在数字金融领域的战略布局与实施成效浮出水面。记者梳理多家上市银行年报发现，在金融服务实体经济质效持续提升的背景下，国有大行与股份制银行正以差异化路径推进数字化转型，金融科技投入保持稳健增长，人工智能大模型应用进入规模化落地阶段。其中，13家有代表性的上市银行金融科技总投入超1800亿元。
