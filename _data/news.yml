- title: 豪雨釀禍？台南路面突塌陷　水管破裂、路標桿傾斜畫面曝光
  description: 即時中心／温芸萱報導台南受連續降雨影響，仁德區中正路二段今（15）日凌晨4時許驚傳路面坍塌。初步研判疑為地下自來水管線破裂，導致路基遭沖刷流失而塌陷，已通報自來水公司前往勘驗及搶修，並協調交通局與相關單位處理。警方已在現場實施交通管制，提醒用路人減速慢行、注意安全。至於事故是否與近日豪雨有直接關聯，以及是否波及其他地下管線，仍待進一步調查釐清。
