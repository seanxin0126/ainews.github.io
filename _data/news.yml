- title: 华泰证券：AI眼镜有望从当前的信息提示工具升级为智能体感知世界的信息入口
  description: 36氪获悉，华泰证券认为，AI眼镜正在成为智能体（Agent）时代重要的硬件入口之一。随着大语言模型从“被动响应”向“主动执行”演进，AI眼镜有望从当前的信息提示工具升级为智能体感知世界的信息入口（类比小龙虾的双眼）。当前全球AI眼镜市场正处于“无显示”向“带显示”过渡的关键节点。看好Meta/Google在2026/2027推出搭载更强AI功能的下一代产品，推动行业规模进一步扩大。中国产业链在硅基OLED、光波导、精密光学、ODM、镜片、CIS/LCOS、Micro
