- title: 三星Galaxy AI将升级为多代理生态系统 深度整合Perplexity AI
  description: "三星内部调研显示，近八成用户日常会同时使用两个以上的 AI 助手，这促使公司加速推进 Galaxy AI 的演进，将其从单一助手升级为多代理（multi-agent）生态系统。\
    \ 新版 Galaxy AI 在操作系统层面加入对多款 AI 助手的集成支持，旨在让用户在“同时使用多个 AI”的场景下获得更加顺畅、一致的体验。\r\n\
    借由系统级整合，Galaxy AI 能在底层统一管理不同 AI 代理，无需用户频繁在应用间切换或重复下达指令。 这不仅减少了操作成本，也能让各个 AI 代理在共享上下文的前提下进行响应，从而实现…"
