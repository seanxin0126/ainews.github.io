- title: 银河证券：AI算力建设需求爆发推动存储长周期涨价，HBM投片比重将持续提升
  description: 36氪获悉，银河证券发布电子行业2026年中期策略称，AI算力建设需求爆发推动存储长周期涨价，HBM投片比重将持续提升。随着NVIDIA新一代Rubin
    Ultra平台即将推出，单颗GPU配置HBM容量将进一步提升至384GB，加上AI ASIC出货量持续增加，将带动HBM需求再度跃升。TrendForce预估，HBM投片量占整体DRAM投片比重将由2025年的18％提升至2027年约30％；HBM位元供给占比也将由8％提高至约13％。此外，随着端侧AI技术的爆发式增长，3D堆叠DRAM方案正成为突破传统存储瓶颈…
