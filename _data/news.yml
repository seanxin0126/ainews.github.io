- title: 我国持续完善人工智能、大数据等新兴领域知识产权保护制度
  description: 4月20日，据2026中国知识产权保护高层论坛上消息，我国围绕人工智能、大数据、基因技术等新兴领域的知识产权保护制度不断完善。在全国17个省市进行了数据知识产权保护试点，截至2025年底，各试点地方累计受理数据知识产权登记申请超10万件，颁发登记证书超4.8万件。围绕新一代信息技术、人工智能等新兴产业，在全国布局建设81家国家级知识产权保护中心和50家快速维权中心，为新兴领域创新主体提供集快速预审、快速维权于一体的“一站式”服务。（央视新闻）
