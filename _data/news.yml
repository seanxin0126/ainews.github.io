- title: Snowflake与AWS扩大合作，承诺投入60亿美元加速企业代理AI应用
  description: 当地时间5月27日，人工智能数据云公司Snowflake宣布，已与亚马逊网络服务（AWS）签署了一项为期多年的战略合作协议（SCA），旨在加速企业对代理式人工智能的采用，帮助全球共同客户更快、更安全地构建和部署人工智能。作为此次合作扩展的一部分，Snowflake向AWS承诺投入60亿美元用于基础设施建设，这是该公司迄今为止最大规模的投入，反映出企业在AWS上运行AI和数据工作负载的需求正在加速增长。（界面）
