- title: 36氪首发｜专注智能运动眼镜，「光粒科技」完成近亿元Pre-B轮融资
  description: "36氪获悉，智能运动眼镜品牌「光粒科技」已完成近亿元Pre-B轮融资，本轮由杭州高新金投投资。本轮资金将主要用于团队建设、技术研发以及全球市场的营销销售拓展。 \n\
    \ 「光粒科技」成立于2017年，专注于AR智能眼镜及运动科学算法的研发。自2023年起，公司聚焦智能运动眼镜赛道，通过全息树脂光波导技术将运动数据实时呈现在用户眼前，解决运动场景下“数据不可见”的痛点。\n\
    \ 目前，光粒已从早期单一的智能泳镜产品，逐步拓展为覆盖游泳、跑步、骑行、户外等多场景的智能运动眼镜矩阵。在智能泳镜这一细分赛道，光粒在国内市场占据领先地…"
