- title: 芝商所将与Silicon Data合作推出算力期货市场
  description: 5月12日，芝商所（CME）与Silicon Data宣布，将于今年晚些时候推出算力期货市场，目前正在等待监管部门审查。新的期货合约将使交易员、金融机构、AI开发者以及云服务提供商能够对数万亿美元规模的算力市场中的波动性和价格风险进行对冲与管理。这些产品将基于Silicon
