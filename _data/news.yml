- title: 公募发行逆向落子，市场风格再平衡或悄然开启
  description: 今年上半年，资本市场呈现出较为明显的“K型”分化特征，AI硬件板块节节攀升，而创新药、有色、化工、消费、恒生科技等板块则因资金虹吸效应出现大幅回撤。在这波热度居高不下的科技行情中，公募基金在产品发行端的表现却有些出人意料。基金公司并未盲目跟风大肆发行科技主题基金，反而选择在非热门赛道逆向落子，提前进行了多元化布局。业内人士普遍认为，随着科技产业叙事逐步进入验证期，前期拥挤度较高、斜率陡峭的科技板块短期面临波动加剧的压力，而前期经历较深调整的板块估值性价优势凸显。（证券时报）
  url: https://36kr.com/newsflashes/3883392742371335
  source: 36kr.com
- title: SpaceX公布AI数据中心计划，同步推进星链卫星脱轨
  description: 太空探索技术公司SpaceX周一公布了一项新的AI数据中心建设计划，同时确认正在按计划推进约100颗第一代星链卫星的脱轨操作。这标志着这家由埃隆·马斯克领导的航天企业正加速向AI基础设施领域延伸布局。根据公司发布的信息，SpaceX计划在美国中西部建设一座专门面向AI工作负载的数据中心，将直接利用其星链卫星网络提供的高速低延迟数据回传能力。（新浪财经）
