  description: "AI的造富效应，的确惊人。\n 作者丨王满华\n 编辑丨王庆武\n 来源丨投中网\n 港股市场的AI热潮从节前一路燃烧至节后，而在这场狂欢中，MiniMax与智谱无疑是最耀眼的主角。\n\
