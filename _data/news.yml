- title: 高端智能投影品牌AWOL Vision获近亿元B轮融资，新品拿下近2000万美金众筹｜硬氪首发
  description: "作者｜黄楠\n 编辑｜袁斯来\n 硬氪获悉，高端智能投影品牌AWOL Vision近日完成近亿元B轮融资，投资方包括天堂硅谷、会畅科技及金鹏佳等机构。资金将主要用于核心技术研发，持续迭代超短焦与长焦激光显示能力，并推进“家庭AI智能娱乐平台”生态构建；同时加快全球渠道与品牌拓展，强化供应链协同，并引入顶尖人才以夯实全球化运营基础。\n\
    \ AWOL Vision成立于2020年，长期专注RGB激光投影与家庭视听体验创新，并以深圳海高特科技有限公司作为其研发与设计中枢，为全球视听领域用户提供更具沉浸感的解决方案，重塑家庭娱乐…"
  url: https://36kr.com/p/3752260051616512
  source: 36kr.com
- title: 英伟达发布神经纹理压缩 显存占用最高可降低85%
  description: "近年来，英伟达一直是技术领域的领跑者，推出了一系列革命性的技术功能，其中最突出的就是其人工智能图像增强技术DLSS， 而在近日的GTC\
    \ 2026大会上，该公司又发布了黑科技——神经纹理压缩。\r\n该人工智能技术据称可将玩游戏时显存的占用降低85%，且画质零损失。其神经纹理压缩Demo显示，在显存占用6.5GB和970MB之间实现了“惊人的视觉效果一致性”。随着游戏变得越来越复杂、越来越逼真，游戏行业越来越依赖图像放大技术来满足不断增长的硬件需求。这种优化不足导致的一个主要问题是显存占用率，近年来显存占用率急剧上升。…"
