- title: 从“被投者”到“投资者”，硬科技企业密集设立产业基金
  description: 6月上旬，硬科技链主企业密集宣布一级市场最新布局：6月2日，国盾量子、兆易创新同日公告旗下产业基金设立、备案最新进度；6月3日，存储芯片龙头长鑫科技联合中微公司、阿里巴巴等，设立规模近40亿元的私募股权基金。“当前，传统人民币、美元基金普遍面临募资、退出压力，产业资本却逆势爆发。”母基金研究中心创始人唐劲草对记者表示，越来越多的硬科技企业通过担任有限合伙人（LP），将资本触角伸向上下游关键环节与前沿技术领域。在集成电路、人工智能、量子计算、生物科技等前沿赛道，曾被资本哺育的硬科技企业正成为反哺创新生态的出资人，完…
