- title: 上市在即 Anthropic 7月9日举行IPO前财务会
  description: "据美国相关投资人披露，Anthropic将于7月9日在美国佛罗里达州举行IPO前研讨会。据该投资人收到的邀请邮件显示，本次简报会将严格限制现有股东和部分受邀机构投资者参加，会议将由该公司CFO\
