- title: 谷歌重新“收编”Intrinsic，加码物理AI布局
  description: 在一项涉及物理AI的重大重组中，Alphabet正将其机器人软件子公司Intrinsic重新划归至另一子公司谷歌旗下。此举结束了Intrinsic近五年的独立运营地位。对于机器人行业而言，这次谷歌的业务整合，也标志着其物理AI领域的投入，正在从研究项目转变为更为关键的业务重心。谷歌在机器人领域涉足已超过十年，将Intrinsic重新并入麾下预示着一种更持久的布局。（财联社）
