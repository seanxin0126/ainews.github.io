- title: 中信建投：国内外大模型密集迭代，继续看好AI产业链
  description: 36氪获悉，中信建投研报称，AI发展日新月异，大模型持续迭代升级，算力需求非常强劲。如智谱新模型编程能力大幅提升，引发算力需求激增，Seedance视频能力表现非常亮眼，引发业界大佬关注。研报认为大模型的商业变现路径畅通，正在从“低价/免费圈地”阶段走向“为高质量付费”阶段，且带动的算力需求非常旺盛。假期期间，美股AI算力光通信个股总体表现亮眼。黄仁勋表示将在3月举办的GTC大会发布“世界前所未见”的芯片。继续看好AI产业链，包括大模型、AI算力链等。
  url: https://36kr.com/newsflashes/3697973071703680
  source: 36kr.com
- title: 陈茂波：香港推出100亿港元创科产业引导基金
  description: 香港特区政府财政司司长陈茂波今日（25日）发表2026至2027财政年度政府财政预算案。陈茂波表示，特区政府推出100亿港元“创科产业引导基金”，引领市场资本投资生命健康科技、AI与机械人、未来产业等策略性新兴领域。特区政府正甄选基金经理，以期基金年内开始运作。（大湾区之声）
