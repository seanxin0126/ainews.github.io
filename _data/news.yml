- title: 算力租赁加速集中，头部企业步入业绩兑现期
  description: 随着全球AI大模型持续迭代，算力需求正从训练侧加速向推理侧延伸，这极大地推高了AI算力资源需求。在此背景下，国内算力租赁、AIDC（智算中心）运营等赛道正步入高景气周期。其中，两家头部算力租赁公司利通电子、协创数据，今年一季度净利润同比分别大幅增长821.08%、343.45%；AIDC代表企业如润泽科技、奥飞数据一季度净利润同比分别增长35.35%、79.19%；与业绩相对应的是，相关公司股价表现不俗。对于产业趋势，妙投高级研究员张博称，在国产替代推进过程中，芯片价值会持续上升，但其业绩兑现有一个爬坡过程，算力…
