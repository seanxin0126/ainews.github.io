  description: 36氪获悉，5月13日举办的Create2026百度AI开发者大会开幕式上，百度创始人李彦宏表示，本届开幕式主题“自我进化”包含三层涵义：一是智能体的自我进化，从被动响应到从环境中不断吸取营养来提升自己，并主动执行；二是人类个体的自我进化，从普通个体到超级个体，并学会跟AI共存；三是企业组织的自我进化，从人与人的分工协作，到人与智能体的混合编队，成为超级组织。
