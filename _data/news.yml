- title: 台积电CEO：全力扩产仍难以满足强劲AI需求
  description: 本周四下午，台积电高管在法说会上宣布，预计2026年公司资本支出将接近520亿至560亿美元的区间顶端水平。当被问及支撑这一资本支出的信心来源时，台积电董事长兼CEO魏哲家回答：“答案很简单：需求极为强劲，尤其是高性能计算与人工智能应用。我们全力加速、提前采购设备，但供应依旧紧张，需求持续增长。这就是资本支出指向区间上限的原因。”（财联社）
