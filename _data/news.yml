- title: 商务部：一季度我国批发和零售业增加值同比增长4.1%
  description: 36氪获悉，据商务部消息，一季度，我国批发和零售业增加值同比增长4.1%，我国批发和零售业发展开局良好。一季度，我国批发和零售业增加值3.5万亿元，同比增长4.1%，占GDP比重为10.5%。市场运行起步平稳，多数业态保持增长。从批发业看，一季度，商务部重点联系商品市场成交额同比增长8.6%，其中生产资料类、工业消费品类市场成交额同比分别增长16.1%、10.7%。从零售业看，一季度，商品零售额11.3万亿元，同比增长2.2%。
