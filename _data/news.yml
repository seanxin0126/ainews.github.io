- title: 美财政部寻求接入Anthropic旗下Mythos模型，以发现系统漏洞
  description: 据一位知情人士透露，美国财政部技术团队正寻求接入Anthropic公司的Mythos人工智能模型，以便开始寻找系统漏洞。该知情人士表示，美国财政部首席信息官萨姆·科科斯的目标是尽快（最早可能在本周）获得该模型的访问权限。Anthropic公司一直仅向有限数量的机构开放该模型。知情人士称，科科斯上周已向财政部的网络安全团队介绍了该技术，并指示他们为强大人工智能系统可能带来的最终威胁做好准备。（新浪财经）
