- title: 實體 AI 對資安帶來新挑戰！臺灣產官學推動「以資安打造可信賴機器人」平台與應用
  description: '實體 AI 時代，打造可信賴機器人成為關鍵。臺灣積極整合零信任與後量子資安技術，為新世代機器人建構堅實的資安防線，確保可信賴機器人安全無虞。隨著新科技迎來典範轉移，實體世界的機器人正從過去執行命令的被動式自動化，快速邁向具備自主決策與動態應變能力的「主動式人工智慧」，同時，這樣的機器人也帶來新的場景ㄧPhysical
    AI：存在於真實世界裡面的AI。

    當 AI 長出實體並深入人類生活，資安防護的意義已發生根本性的改變。過去的資安攻擊造成數位系統癱瘓，如今演變成可能直接危及人類生命與物理環境的安全威脅。

