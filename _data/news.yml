  source: Cnbeta.com.tw
- title: AI热潮改变规则：议价权最强的苹果，为何也抢不到内存？
  description: "6月19日，据《华尔街日报》报道，苹果公司买得起它所需要的内存芯片，但如今就连苹果采购这些芯片都变得越来越困难，这本身就说明了当前内存短缺问题的严重性，也表明即便是全球最富有的公司之一，最终也会陷入被动局面。\r\
    \n库克宣布涨价数月来，外界一直在猜测苹果如何应对内存芯片成本飙升。现在，苹果终于表明态度：宣布涨价。苹果CEOTim Cook(Tim Cook)对《华尔街日报》表示，公司一直试图在不将成本转嫁给消费者的情况下消化内存价格的“大幅上涨”，但“这种状况已经难以持续”。对于一家长期习惯在供应商面前掌握绝对主导权…"
  url: https://www.cnbeta.com.tw/articles/tech/1566252.htm
  source: Cnbeta.com.tw
- title: 微软在中国拓展AI业务：字节跳动每年花费10亿美元
  description: "据彭博社报道，微软公司正在扩大其在中国的人工智能业务，字节跳动预计每年将在微软的人工智能和云服务上花费超过10亿美元。彭博社报道称，微软已成为中国\
    \ OpenAI 模型的主要提供商，通过其 Azure 平台提供 GPT 系列模型的访问权限，而 OpenAI 和 Anthropic 则由于担心知识产权保护和潜在的滥用问题，基本上将其服务排除在中国市场之外。\r\
    \n知情人士告诉彭博社，TikTok 的母公司字节跳动近年来一直是微软最大的 AI 客户，并且有望在 Azure 和 AI 相关服务上的年度支出超过 10\
    \ 亿美元。…"
