- title: 逾八成消费电子及家电A股公司2025年实现盈利
  description: 受益于AI技术深度赋能、业务与海外市场多元拓展以及“以旧换新”等政策落地，2025年A股消费电子与家电行业整体呈现稳步修复态势，企业加快转型升级，逐步迈向价值提升新阶段。Choice数据显示：截至4月1日19时，在已披露2025年业绩的35家消费电子A股公司中，30家公司实现盈利，18家实现正增长；在已披露2025年业绩的34家家用电器公司中，32家公司实现盈利，13家实现正增长。总体来看，逾八成消费电子及家电A股公司在2025年实现盈利，其中头部企业与创新型企业表现亮眼。（上证报）
