- title: 自变量机器人完成近20亿元B轮融资，小米战投、红杉中国领投丨智能涌现独家
  description: "文｜邱晓芬\n 编辑｜苏建勋\n 《智能涌现》独家获悉，自变量机器人已经于三月底至四月初完成近20亿元B轮融资，领投方为小米战投和红杉中国。\n\
    \ 不久前，美团、阿里和字节分别在A轮、A+轮、A++轮领投或独投自变量机器人。截至目前，自变量已成为国内唯一一家同时被四家互联网大厂投资的具身智能企业。\n\
    \ 对此，自变量方面暂无回应。\n 小米战投在具身智能机器人领域已落子，近两年公开的投资项目包括纬钛机器人（触觉传感）、曦诺未来（灵巧手）、萝博派对（本体）、章鱼动力（模型）。\n\
    \ 除了对外投资布局，小米自己的机器人产品也正在快速推…"
