- title: 高盛称对冲基金对亚洲股票买入规模创十年来最高
  description: 上周，对冲基金对亚洲新兴和发达市场的净买入规模创下高盛Prime Services交易台自2016年开始追踪该数据以来的最高纪录，该地区受益于市场对人工智能基础设施企业的乐观预期。该交易部门报告显示，上周对冲基金成为全球股票净买方，这是三周以来的首次，资金涌入所有主要市场
    —— 但亚洲尤为突出。随着投资者轮换退出动量趋势，同时对美元走弱作出反应，新兴市场持续跑赢。（新浪财经）
