- title: 供需格局持续重构，铝价后市上行可期
  description: 今年以来，内外盘铝市走出显著的分化行情，伦铝、沪铝期货价格同步上行但涨幅差距显著，呈现出外强内弱的特征。近一个月以来，两者价格均在高位区间维持震荡。业内人士表示，中东地缘冲突引发的海外市场供给收缩是本轮铝价上涨的核心驱动力，但海内外库存水平迥异，造成了内外盘价格走势分化。目前来看，全球铝市供给偏紧格局已定，随着国内铝材出口持续回暖、库存逐步进入去化周期，叠加新能源等新兴产业需求稳步增加，内外盘铝价中长期均具备上涨动能。（中证网）
  url: https://36kr.com/newsflashes/3821223420580228
  source: 36kr.com
