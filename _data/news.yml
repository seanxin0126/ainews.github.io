- title: 微软开始在部分软件中改用自研AI模型，减少对OpenAI和Anthropic依赖
  description: 微软公司寻求降低人工智能成本，正开始在Excel和Outlook等软件产品中以自研模型取代OpenAI和Anthropic的模型。据一位知情人士透露，这两款广泛使用的软件中，每周有数以万计的AI任务由微软内部开发的MAI人工智能模型完成。该知情人士表示，此前Excel和Outlook更多依赖OpenAI和Anthropic的模型。（新浪财经）
