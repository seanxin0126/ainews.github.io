- title: 国家药监局：到2030年初步构建药品监管与人工智能融合创新体系
  description: 36氪获悉，4月2日，国家药监局发布《关于“人工智能+药品监管”的实施意见》。《意见》提出，到2030年，初步构建药品监管与人工智能融合创新体系，“人工智能+药品监管”运行管理机制基本形成，算力支撑底座更加集约高效，形成满足监管智能化需要的高质量数据集、垂直大模型和智能体，人工智能在审评审批、监督检查、检验监测、政务服务等场景中有效应用，人机协同效率显著提升，全生命周期数智化监管能力迈上新台阶。到2035年，基本形成数智驱动、智能敏捷、自主可控、生态协同的智慧化药品安全治理新格局。
