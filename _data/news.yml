- title: 甲骨文数据中心支出高于预期
  description: 甲骨文公布的季度资本支出高于预期，引发投资者对该公司人工智能（AI）基础设施业务盈利能力的担忧。在截至5月31日的财季中，公司资本支出为159亿美元，这使全年资本支出总额达到557亿美元，高于甲骨文此前预计的500亿美元支出。资本支出很大程度上是衡量数据中心支出的指标。（新浪财经）
