- title: 中信建投：光棒扩产潮无需过度担忧，GPT-5.6发布，持续推荐AI产业链
  description: 36氪获悉，中信建投研报表示，光棒及光纤扩产潮来袭。今年以来，光纤价格大幅上涨，投资回报率显著提升，推动启动光棒扩产计划。我们认为，AI的发展对光纤的需求拉动明显，目前行业依然供不应求。虽然多家公司计划扩产，但一是多数公司过往光棒制造经验较少，是否可以如期扩产仍需观察，二是即使如期扩产，但大部分产能释放要在明年下半年或者更晚，因此对于今年、甚至明年的行业供需格局影响不大，而且AI的需求也可能更为强劲，因此短期内无需过度担忧。
  url: https://36kr.com/newsflashes/3874891104244737
  source: 36kr.com
