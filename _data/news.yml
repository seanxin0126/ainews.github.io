- title: Anthropic调查Mythos模型遭未授权访问事件
  description: 人工智能领域传来安全警报。据报道，一群未授权用户通过第三方承包商环境成功访问了Anthropic公司最新发布的高危AI模型“Mythos
    Preview”。Anthropic发言人在声明中证实：“我们正在调查一份声称通过第三方供应商环境对Claude Mythos Preview进行未授权访问的报告。”目前尚未发现该未授权行为对Anthropic系统造成影响。（新浪财经）
