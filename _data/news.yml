- title: 美国下令外交官游说反对数据监管倡议
  description: 一份内部外交电报报道，特朗普政府已要求美国的外交官游说反对外国政府推动相关举措，这些举措旨在监管美国科技公司对外国人数据的处理。报道称，美国政府认为，外国的上述监管可能干扰与人工智能相关的服务。美国国务院未回应置评请求。（新浪财经）
