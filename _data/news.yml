- title: 群核科技空间智能大模型完成国家备案
  description: 5月18日，浙江省互联网信息办公室发布浙江省生成式人工智能服务备案信息的最新公告。公告显示，群核科技空间智能大模型正式通过备案，成为国内首批完成合规备案的空间智能大模型之一，标志着该大模型在合规性、安全性和技术规范性上获得权威认可，具备面向市场开展合规服务的资质。该模型是业界首个专注于3D室内场景认知与生成的空间大模型，具备结构化理解和可视化生成等核心能力，应用于智能机器人训练、工业数字孪生与仿真、AI驱动的空间规划与设计、3D
    AI内容创作等领域。
