- title: 第六批引進辦重點企業名單今公布 陳茂波︰多間公司市值達千億
  description: 政府今日將公布第六批引進辦的重點企業名單。財政司長陳茂波透露，今批名單包括多間市值達千億元的公司，其中生命健康科技企業屬全球領先，並會在港開展臨床研究，可望進一步支持香港在國際醫療研發領域的地位；又透露引進重點企業辦公室此前已成功引進逾100間重點企業。它們合共累計實際投資達225億元，創造職位逾8,000個。陳茂波表示，新一批引進的重點企業名單，涵蓋生命健康科技、低空經濟、人工智能、新能源材料、跨境金融基建、金融科技等前沿領域。其中的生命健康科技企業屬全球領先，它們將在港開展臨床研究；亦有多家企業將在港設立研發…
