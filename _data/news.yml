- title: 900亿元增量资金入市，公募聚焦两大主线
  description: 马年行情开市在即，公募增量资金准备继续。从统计来看，股票ETF和春节前成立有待建仓的次新主动权益基金，是马年开年行情入市的两大类公募资金，两者合计规模在900亿元以上。公募预判认为，马年A股市场有望呈现主线更为丰富、结构更趋均衡的态势。“科技成长”与“中国优势”是两大核心主线，坚定看好AI所引领的整个科技产业长期向上趋势，以及具备全球竞争力的中国制造业。（证券时报）
