- title: 海康威视7月1日上调硬盘价，知情人士：原厂三季度硬盘成本涨幅超50%
  description: 据蓝鲸新闻，从知情人士处获悉，海康威视近日已向经销商下发硬盘调价函，自今年7月1日起，公司硬盘产品价格将进行同步上调。此外，7月1日之前，海康威视旗下其他产品也将先行完成一轮涨价，而此次硬盘价格上调主要针对经销商渠道。面对当前供应与价格波动较大的形势，海康威视已建议经销商尽快锁定订单与价格。实际上，这并非海康威视首次调价，也并非其个例行为。对于本次调价的原因，知情人士表示，核心在于AI需求的“爆发式”增长所带来的持续性挤兑效应。（财联社）
