- title: 智元机器人，要做AI大模型平台和开放生态
  description: "文｜王毓婵\n 编辑｜杨轩\n 当一家机器人公司决定做AI大模型平台和开放生态，它会给行业带来什么？\n 上个月，智元刚刚跨过“机器人量产下线一万台”的门槛。4月17日，这家由前华为“天才少年”彭志辉与前华为副总裁邓泰华共同创立的机器人公司在合作伙伴大会上，花了大量的时间和篇幅介绍软件上的新产品。相较之下，硬件的篇幅反倒很少。\n\
